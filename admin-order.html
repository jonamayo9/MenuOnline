<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media print {
      @page { margin: 0; size: 80mm auto; }
      body * { display: none !important; }
      #ticket-print, #ticket-print * { display: block !important; }

      #ticket-print{
        position: absolute;
        left: 0; top: 0;
        width: 80mm !important;
        padding: 4mm !important;
        background: white !important;
        color: black !important;
        font-family: 'Courier New', Courier, monospace !important;
        font-size: 12px !important;
        line-height: 1.2 !important;
      }

      .no-print { display: none !important; }
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">

  <!-- Toast -->
  <div id="toastContainer" class="fixed top-6 right-6 z-50"></div>

  <!-- =========================
       TICKET (SOLO PARA IMPRIMIR)
       ========================= -->
  <div id="ticket-print" class="hidden">
    <div id="ticket-body"></div>
  </div>

  <!-- Banner de NUEVOS pedidos -->
  <div id="newBanner" class="hidden fixed top-5 left-1/2 -translate-x-1/2 z-50 transition-all duration-300">
    <div class="flex items-center gap-4 bg-slate-900 text-white rounded-2xl px-6 py-4 shadow-2xl">
      <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
      <div class="text-sm font-medium">
        <span class="font-bold text-lg" id="newCount">0</span>
        pedido(s) nuevo(s)
      </div>
      <button id="goNew"
        class="px-4 py-2 bg-white text-slate-900 rounded-xl font-semibold hover:bg-slate-200 transition">
        Ver nuevos
      </button>
      <button id="dismissNew"
        class="hover:bg-white/10 p-2 rounded-lg transition" title="Ocultar">
        ✕
      </button>
    </div>
  </div>

  <!-- Modal: NUEVOS -->
  <div id="newModal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-3xl mx-auto mt-16 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-5 flex items-center justify-between">
        <div>
          <div class="text-xl font-extrabold">Pedidos nuevos</div>
          <div class="text-sm text-slate-500">Tomalos y pasalos a “Preparando”.</div>
        </div>
        <button id="closeNewModal" class="px-3 py-2 rounded-xl hover:bg-slate-100 transition">✕</button>
      </div>

      <div id="newModalList" class="p-5 pt-0 space-y-3 max-h-[70vh] overflow-auto"></div>
    </div>
  </div>

  <!-- =========================
       MODAL DETALLE + IMPRIMIR
       ========================= -->
  <div id="detailModal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-2xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-5 flex items-center justify-between border-b border-slate-200">
        <div>
          <div id="dTitle" class="text-xl font-extrabold">Pedido</div>
          <div id="dSub" class="text-sm text-slate-500 mt-1"></div>

        <button id="closeDetailModal" class="px-3 py-2 rounded-xl hover:bg-slate-100 transition">✕</button>
      </div>

      <div class="p-5 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-slate-50 rounded-2xl border border-slate-200 p-4">
            <div class="text-xs text-slate-400 font-semibold">Cliente</div>
            <div id="dCustomer" class="font-extrabold mt-1">—</div>
            <div id="dAddress" class="text-sm text-slate-600 mt-1">—</div>
          </div>

          <div class="bg-slate-50 rounded-2xl border border-slate-200 p-4">
            <div class="text-xs text-slate-400 font-semibold">Pago</div>
            <div id="dPayment" class="font-extrabold mt-1">—</div>
            <div class="mt-2 text-2xl font-extrabold">$ <span id="dTotal">0</span></div>
            <div class="mt-3">
              <span id="dStatus" class="px-3 py-1 rounded-full text-xs font-semibold border bg-slate-50 text-slate-700 border-slate-200">—</span>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 font-extrabold">Items</div>
          <div id="dItems" class="p-4 space-y-2"></div>
        </div>

        <div class="flex flex-wrap justify-end gap-2">
          <button id="btnPrintTicket"
            class="hidden px-5 py-3 rounded-2xl bg-slate-900 text-white font-semibold hover:shadow-lg transition">
            Imprimir ticket
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- =========================
       MODAL CONFIRMAR CANCELACIÓN
       ========================= -->
  <div id="cancelModal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-md mx-auto mt-24 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-5 flex items-start justify-between border-b border-slate-200">
        <div>
          <div class="text-xl font-extrabold text-slate-900">Cancelar pedido</div>
          <div id="cancelSub" class="text-sm text-slate-500 mt-1">—</div>
        </div>
        <button id="closeCancelModal" class="px-3 py-2 rounded-xl hover:bg-slate-100 transition">✕</button>
      </div>

      <div class="p-5">
        <div class="bg-rose-50 border border-rose-100 text-rose-800 rounded-2xl p-4 text-sm">
          Esta acción marca el pedido como <b>Cancelado</b>. ¿Querés continuar?
        </div>

        <div class="mt-5 flex justify-end gap-2">
          <button id="btnCancelBack"
            class="px-5 py-3 rounded-2xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
            Volver
          </button>
          <button id="btnCancelConfirm"
            class="px-5 py-3 rounded-2xl bg-rose-600 text-white font-semibold hover:bg-rose-700 transition">
            Sí, cancelar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto p-6">

    <!-- Header (PROLIJO) -->
    <div class="bg-white rounded-3xl shadow-sm p-6 mb-6 border border-slate-200">
      <div class="flex items-start justify-between gap-8 flex-wrap">

        <!-- IZQUIERDA -->
        <div class="min-w-[280px]">
          <div class="flex items-center gap-4">
            <!-- Volver -->
            <a href="./home.html"
               class="h-11 w-11 grid place-items-center rounded-2xl bg-slate-100 text-slate-800 text-lg font-bold
                      hover:bg-slate-200 transition"
               title="Volver">
              ←
            </a>

            <div>
              <h1 class="text-3xl font-extrabold tracking-tight leading-tight">Gestión de pedidos</h1>

              <div class="mt-1 flex items-center gap-4 flex-wrap">
                <p class="text-sm text-slate-500">
                  Filtro por defecto:
                  <span class="font-semibold text-amber-600">Preparando</span>
                </p>

                <!-- Sonido integrado -->
                <button id="btnEnableSound"
                  class="px-3 py-1.5 rounded-full bg-amber-100 text-amber-900 text-xs font-semibold
                         hover:bg-amber-200 transition">
                  🔊 Activar sonido
                </button>

                <span id="soundState" class="text-xs text-slate-400"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- DERECHA -->
        <div class="flex items-end gap-4 flex-wrap">
          <div class="flex flex-col">
            <label class="text-xs text-slate-400 mb-1">Fecha</label>
            <input id="date" type="date"
              class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
          </div>

          <div class="flex flex-col">
            <label class="text-xs text-slate-400 mb-1">Estado</label>
            <select id="status"
              class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-slate-400 transition">
              <option value="0">Nuevo</option>
              <option value="1">Preparando</option>
              <option value="3">Entregado</option>
              <option value="4">Cancelado</option>
            </select>
          </div>

          <button id="refresh"
            class="px-6 py-3 rounded-2xl bg-slate-900 text-white font-semibold shadow
                   hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
            Actualizar
          </button>
        </div>

      </div>
    </div>

    <!-- Summary -->
    <div class="flex justify-end items-center mb-4">
      <div id="summary" class="text-sm text-slate-500"></div>
    </div>

    <!-- Lista -->
    <div id="list" class="space-y-4"></div>

  </div>

  <script>
  let CONFIG = null;
  let isRefreshing = false;

  // =========================
  // AUTH GUARD (SIN DUPLICADOS)
  // =========================
  const TOKEN_KEY = "menuonline_token";
  const SLUG_KEY  = "menuonline_companySlug";
  const LOGIN_PAGE = "./login.html";
  //const CONFIG_PATH = "/MenuOnline/config.json";
  const CONFIG_PATH = "/config.json";

  function logoutToLogin(){
    localStorage.removeItem(TOKEN_KEY);
    location.replace(LOGIN_PAGE);
  }

  function parseJwt(token){
    try{
      const base64Url = token.split(".")[1];
      const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(atob(base64).split("").map(c =>
        "%" + c.charCodeAt(0).toString(16).padStart(2,"0")
      ).join(""));
      return JSON.parse(json);
    }catch{ return null; }
  }

  function isTokenValid(token){
    const payload = parseJwt(token);
    const exp = payload?.exp;
    if(!exp) return false;
    const now = Math.floor(Date.now()/1000);
    return exp > now;
  }

  function requireAuth(){
    const t = localStorage.getItem(TOKEN_KEY);
    if(!t || !isTokenValid(t)){
      logoutToLogin();
      return false;
    }
    return true;
  }

  function authHeaders(extra = {}){
    const token = localStorage.getItem(TOKEN_KEY);
    return { ...extra, "Authorization": "Bearer " + token };
  }

  async function fetchAuth(url, options = {}){
    if(!requireAuth()) return null;

    const res = await fetch(url, {
      ...options,
      headers: authHeaders(options.headers || {})
    });

    if(res.status === 401 || res.status === 403){
      logoutToLogin();
      return null;
    }
    return res;
  }

  function getSlug(){
    return localStorage.getItem(SLUG_KEY) || CONFIG.companySlug;
  }

  // =========================
  // TOAST
  // =========================
  let activeToastEl = null;

  function toastShow(message, type = "info") {
    const container = document.getElementById("toastContainer");

    if (activeToastEl) {
      activeToastEl.remove();
      activeToastEl = null;
    }

    const colors = {
      success: "bg-emerald-500",
      error: "bg-rose-500",
      info: "bg-slate-900"
    };

    const icon = type === "success" ? "✓" : type === "error" ? "⚠" : "⏳";

    const el = document.createElement("div");
    el.className = `
      ${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl
      flex items-center gap-3 min-w-[280px]
      transform transition-all duration-200 translate-y-2 opacity-0
    `;
    el.innerHTML = `
      <div class="text-lg font-bold leading-none">${icon}</div>
      <div class="text-sm font-semibold">${message}</div>
    `;

    container.appendChild(el);
    activeToastEl = el;

    requestAnimationFrame(() => {
      el.classList.remove("translate-y-2", "opacity-0");
    });

    return el;
  }

  function toastUpdate(message, type = "info", autoCloseMs = null) {
    if (!activeToastEl) {
      toastShow(message, type);
      if (autoCloseMs) toastAutoClose(autoCloseMs);
      return;
    }

    const colors = {
      success: "bg-emerald-500",
      error: "bg-rose-500",
      info: "bg-slate-900"
    };

    const icon = type === "success" ? "✓" : type === "error" ? "⚠" : "⏳";

    activeToastEl.className = `
      ${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl
      flex items-center gap-3 min-w-[280px]
      transform transition-all duration-200
    `;
    activeToastEl.innerHTML = `
      <div class="text-lg font-bold leading-none">${icon}</div>
      <div class="text-sm font-semibold">${message}</div>
    `;

    if (autoCloseMs) toastAutoClose(autoCloseMs);
  }

  function toastAutoClose(ms = 1800) {
    const el = activeToastEl;
    if (!el) return;

    setTimeout(() => {
      if (activeToastEl !== el) return;

      el.classList.add("translate-y-2", "opacity-0");
      setTimeout(() => {
        if (activeToastEl === el) activeToastEl = null;
        el.remove();
      }, 200);
    }, ms);
  }

  function toastClear() {
    if (!activeToastEl) return;
    activeToastEl.remove();
    activeToastEl = null;
  }

  // ===== Labels =====
  const STATUS_LABEL = { 0:"Nuevo", 1:"Preparando", 2:"Enviado", 3:"Entregado", 4:"Cancelado" };

  function statusBadge(status) {
    switch (status) {
      case 0: return "bg-blue-50 text-blue-700 border-blue-100";
      case 1: return "bg-amber-50 text-amber-800 border-amber-100";
      case 2: return "bg-purple-50 text-purple-800 border-purple-100";
      case 3: return "bg-emerald-50 text-emerald-800 border-emerald-100";
      case 4: return "bg-rose-50 text-rose-800 border-rose-100";
      default: return "bg-slate-50 text-slate-700 border-slate-100";
    }
  }

  function fmtDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleString("es-AR");
  }

  function money(n) {
    return new Intl.NumberFormat("es-AR").format(n);
  }

  // =========================
  // AUDIO
  // =========================
  let audioCtx = null;
  let soundUnlocked = false;

  async function unlockAudio(withTest = true){
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;

      if(!audioCtx) audioCtx = new AudioCtx();

      if(audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      soundUnlocked = (audioCtx.state === "running");
      document.getElementById("soundState").textContent = soundUnlocked ? "Sonido activado ✅" : "Toque para activar";

      if(withTest && soundUnlocked){
        playNewOrderSound(true);
      }

      return soundUnlocked;
    }catch(e){
      soundUnlocked = false;
      document.getElementById("soundState").textContent = "No pude activar sonido (bloqueado)";
      return false;
    }
  }

  function playNewOrderSound(isTest = false) {
    try {
      if(!audioCtx || audioCtx.state !== "running") return;

      const master = audioCtx.createGain();
      master.gain.value = 0.55;
      master.connect(audioCtx.destination);

      function beep(freq, ms, type = "square", gain = 1.0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        o.type = type;
        o.frequency.value = freq;

        const now = audioCtx.currentTime;
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + ms / 1000);

        o.connect(g);
        g.connect(master);

        o.start(now);
        o.stop(now + ms / 1000);
      }

      beep(988, 260, "square", 1.0);
      setTimeout(() => beep(784, 260, "square", 1.0), 290);
      setTimeout(() => beep(440, 180, "sine", 0.8), 610);

      if(isTest){
        toastUpdate("🔊 Sonido OK", "success", 1200);
      }
    } catch {}
  }

  function setSummary(orders) {
    const count = orders.length;
    const total = orders.reduce((acc, o) => {
      const st = Number(o.status);
      if (st === 4) return acc;
      return acc + (Number(o.total) || 0);
    }, 0);

    document.getElementById("summary").textContent =
      count ? `${count} pedido(s) · Total $ ${money(total)}` : "";
  }

  // =========================
  // CONFIG
  // =========================
  async function loadConfig() {
    const res = await fetch(CONFIG_PATH, { cache: "no-store" });
    if (!res.ok) throw new Error("No pude leer config.json");
    return await res.json();
  }

  // =========================
  // API
  // =========================
  async function fetchOrders() {
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    const params = new URLSearchParams();
    if (date) params.set("date", date);
    if (status !== "") params.set("status", status);

    const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/orders` + (params.toString() ? `?${params}` : "");
    const res = await fetchAuth(url);
    if(!res) return [];
    if (!res.ok) throw new Error("Error cargando pedidos");
    return await res.json();
  }

  async function fetchNewCountToday() {
    const date = document.getElementById("date").value;
    const params = new URLSearchParams();
    if (date) params.set("date", date);
    params.set("status", "0");

    const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/orders?${params.toString()}`;
    const res = await fetchAuth(url);
    if(!res) return 0;
    if (!res.ok) return 0;
    const list = await res.json();
    return Array.isArray(list) ? list.length : 0;
  }

  async function fetchNewOrders() {
    const date = document.getElementById("date").value;
    const params = new URLSearchParams();
    if (date) params.set("date", date);
    params.set("status", "0");

    const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/orders?${params.toString()}`;
    const res = await fetchAuth(url);
    if(!res) return [];
    if (!res.ok) throw new Error("No pude cargar pedidos nuevos");
    return await res.json();
  }

  async function fetchOrderDetail(orderId){
    const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/orders/${orderId}`;
    const res = await fetchAuth(url);
    if(!res) return null;
    if(!res.ok) throw new Error("No pude cargar el detalle del pedido");
    return await res.json();
  }

  async function updateStatus(orderId, status) {
    const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/orders/${orderId}/status`;
    const res = await fetchAuth(url, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status })
    });
    if(!res) return;
    if (!res.ok) throw new Error("Error cambiando estado");
  }

  // =========================
  // UI helpers
  // =========================
  function showNewBanner(count) {
    document.getElementById("newCount").textContent = String(count);
    document.getElementById("newBanner").classList.remove("hidden");
  }

  function hideNewBanner() {
    document.getElementById("newBanner").classList.add("hidden");
  }

  function openNewModal() { document.getElementById("newModal").classList.remove("hidden"); }
  function closeNewModal() { document.getElementById("newModal").classList.add("hidden"); }

  function openDetailModal(){ document.getElementById("detailModal").classList.remove("hidden"); }
  function closeDetailModal(){ document.getElementById("detailModal").classList.add("hidden"); }

  // ===== Cancel modal =====
  const cancelState = { orderId: null, orderNumber: null, after: null };

  function openCancelModal(orderId, orderNumber, afterFn){
    cancelState.orderId = Number(orderId);
    cancelState.orderNumber = orderNumber ? String(orderNumber) : null;
    cancelState.after = typeof afterFn === "function" ? afterFn : null;

    document.getElementById("cancelSub").textContent =
      cancelState.orderNumber ? `Pedido #${cancelState.orderNumber}` : `Pedido ID ${cancelState.orderId}`;

    document.getElementById("cancelModal").classList.remove("hidden");
  }

  function closeCancelModal(){
    document.getElementById("cancelModal").classList.add("hidden");
    cancelState.orderId = null;
    cancelState.orderNumber = null;
    cancelState.after = null;
  }

  async function confirmCancel(){
    if(!cancelState.orderId) return;
    const id = cancelState.orderId;

    try{
      toastShow("Cancelando pedido...", "info");
      await updateStatus(id, 4);

      closeCancelModal();

      const after = cancelState.after;
      cancelState.after = null;

      await refresh();
      await checkNewOrders();
      if (after) await after();

      toastUpdate("Pedido cancelado", "success", 1800);
    }catch(e){
      console.error(e);
      toastUpdate("Error al cancelar", "error", 2500);
    }
  }

  function buildTicketHtml(detail){
    const created = new Date(detail.createdAt).toLocaleString("es-AR");
    const negocio = (getSlug() || "").toUpperCase();

    const lines = (detail.items || []).map(it => {
      const qty = Number(it.qty || 0);
      const unit = Number(it.unitPrice || 0);
      const line = Number(it.lineTotal ?? (qty * unit)) || 0;
      const note = (it.note || "").trim();

      return `
        <div style="margin-top:6px;">
          <div><b>${qty}x</b> ${escapeHtml(it.name || "")}</div>
          <div style="display:flex; justify-content:space-between;">
            <span>@ $${money(unit)}</span>
            <b>$${money(line)}</b>
          </div>
          ${note ? `<div style="margin-top:2px;">Nota: ${escapeHtml(note)}</div>` : ``}
        </div>
      `;
    }).join("");

    return `
      <div style="text-align:center;">
        <div style="font-weight:bold; font-size:14px;">PEDIDO #${detail.orderNumber}</div>
        <div style="margin-top:2px;">${negocio}</div>
        <div style="margin-top:6px;">${created}</div>
      </div>

      <div style="margin-top:10px; border-top:1px dashed #000; padding-top:8px;">
        <div><b>Cliente:</b> ${escapeHtml(detail.customerName || "")}</div>
        <div><b>Dirección:</b> ${escapeHtml(detail.address || "")}</div>
        <div><b>Pago:</b> ${escapeHtml(detail.paymentMethod || "")}</div>
      </div>

      <div style="margin-top:10px; border-top:1px dashed #000; padding-top:8px;">
        ${lines || "<div>(Sin items)</div>"}
      </div>

      <div style="margin-top:10px; border-top:1px dashed #000; padding-top:8px; display:flex; justify-content:space-between; font-size:14px;">
        <b>TOTAL</b>
        <b>$${money(detail.total || 0)}</b>
      </div>

      <div style="margin-top:10px; text-align:center;">
        <div>Gracias 🙌</div>
      </div>
    `;
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function openOrderDetail(orderId){
    try{
      toastShow("Cargando detalle...", "info");
      const d = await fetchOrderDetail(orderId);
      if(!d) return;

      document.getElementById("dTitle").textContent = `Pedido #${d.orderNumber}`;
      document.getElementById("dSub").textContent = fmtDateTime(d.createdAt);
      document.getElementById("dCustomer").textContent = d.customerName || "—";
      document.getElementById("dAddress").textContent = d.address || "—";
      document.getElementById("dPayment").textContent = d.paymentMethod || "—";
      document.getElementById("dTotal").textContent = money(d.total || 0);

      const st = Number(d.status);
      const badgeCls = statusBadge(st);
      document.getElementById("dStatus").className = `px-3 py-1 rounded-full text-xs font-semibold border ${badgeCls}`;
      document.getElementById("dStatus").textContent = STATUS_LABEL[st] ?? st;

      const itemsEl = document.getElementById("dItems");
      itemsEl.innerHTML = (d.items || []).map(it => `
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="font-semibold truncate">${escapeHtml(it.name || "")}</div>
            <div class="text-xs text-slate-500">
              ${it.qty} x $${money(it.unitPrice || 0)}
              ${it.note ? ` · Nota: ${escapeHtml(it.note)}` : ``}
            </div>
          </div>
          <div class="font-extrabold">$ ${money(it.lineTotal ?? ((it.qty||0)*(it.unitPrice||0)))}</div>
        </div>
      `).join("");

      const btnPrint = document.getElementById("btnPrintTicket");
      if(st === 1){
        btnPrint.classList.remove("hidden");
        btnPrint.onclick = () => printTicket(d);
      } else {
        btnPrint.classList.add("hidden");
        btnPrint.onclick = null;
      }

      openDetailModal();
      toastClear();
    }catch(e){
      console.error(e);
      toastUpdate("No pude cargar el detalle", "error", 2500);
    }
  }

  function printTicket(detail){
    document.getElementById("ticket-body").innerHTML = buildTicketHtml(detail);
    document.getElementById("ticket-print").classList.remove("hidden");

    setTimeout(() => {
      window.print();
      document.getElementById("ticket-print").classList.add("hidden");
    }, 50);
  }

  function renderNewModal(orders) {
    const el = document.getElementById("newModalList");

    if (!orders.length) {
      el.innerHTML = `
        <div class="p-4 rounded-2xl border bg-slate-50">
          No hay pedidos nuevos 🎉
        </div>`;
      return;
    }

    el.innerHTML = orders.map(o => `
      <div class="p-4 rounded-2xl border bg-white hover:shadow-md transition"
           data-order="${o.id}" data-order-number="${o.orderNumber}">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <div class="text-lg font-extrabold">#${o.orderNumber}</div>
            <div class="text-sm text-slate-500">${fmtDateTime(o.createdAt)}</div>
            <div class="mt-2 text-xl font-extrabold">$ ${money(o.total)}</div>
          </div>

          <div class="flex gap-2">
            <button class="px-4 py-2 rounded-xl bg-amber-100 text-amber-800 font-semibold hover:bg-amber-200 transition"
              data-take="1" data-id="${o.id}">
              Tomar (Preparando)
            </button>

            <button class="px-4 py-2 rounded-xl bg-rose-100 text-rose-800 font-semibold hover:bg-rose-200 transition"
              data-cancel="1" data-id="${o.id}">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    `).join("");

    el.querySelectorAll("button[data-take='1']").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-id");
        try {
          toastShow("Tomando pedido...", "info");
          await updateStatus(id, 1);
          closeNewModal();
          await refresh();
          await checkNewOrders();
          toastUpdate("Pedido pasado a Preparando", "success", 1800);
          await openOrderDetail(Number(id));
        } catch (e) {
          console.error(e);
          toastUpdate("Error al tomar pedido", "error", 2500);
        }
      });
    });

    el.querySelectorAll("button[data-cancel='1']").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        const card = btn.closest("[data-order]");
        const orderNumber = card?.getAttribute("data-order-number") || null;

        openCancelModal(id, orderNumber, async () => {
          await refresh();
          await checkNewOrders();
        });
      });
    });
  }

  function renderOrders(orders) {
    const el = document.getElementById("list");
    setSummary(orders);

    if (!orders.length) {
      el.innerHTML = `
        <div class="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
          <div class="font-semibold">No hay pedidos</div>
          <div class="text-sm text-slate-600 mt-1">Probá cambiando la fecha o el estado.</div>
        </div>`;
      return;
    }

    const currentFilter = document.getElementById("status").value;

    el.innerHTML = orders.map(o => {
      const st = Number(o.status);
      const actions = [];

      actions.push(`
        <button class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition"
          data-action="detail" data-id="${o.id}">
          Ver detalle
        </button>
      `);

      if (st === 4) {
        // solo detalle
      } else if (st === 3) {
        actions.push(`
          <button class="px-4 py-2 rounded-xl bg-rose-100 text-rose-800 font-semibold hover:bg-rose-200 transition"
            data-action="cancel" data-id="${o.id}">
            Cancelar
          </button>
        `);
      } else if (st === 1) {
        if (currentFilter !== "3") {
          actions.push(`
            <button class="px-4 py-2 rounded-xl bg-emerald-100 text-emerald-800 font-semibold hover:bg-emerald-200 transition"
              data-action="set" data-id="${o.id}" data-status="3">
              Entregado
            </button>
          `);
        }
        actions.push(`
          <button class="px-4 py-2 rounded-xl bg-rose-100 text-rose-800 font-semibold hover:bg-rose-200 transition"
            data-action="cancel" data-id="${o.id}">
            Cancelar
          </button>
        `);
      } else if (st === 0) {
        if (currentFilter !== "1") {
          actions.push(`
            <button class="px-4 py-2 rounded-xl bg-amber-100 text-amber-800 font-semibold hover:bg-amber-200 transition"
              data-action="set" data-id="${o.id}" data-status="1">
              Preparando
            </button>
          `);
        }
        actions.push(`
          <button class="px-4 py-2 rounded-xl bg-rose-100 text-rose-800 font-semibold hover:bg-rose-200 transition"
            data-action="cancel" data-id="${o.id}">
            Cancelar
          </button>
        `);
      }

      return `
        <div data-order="${o.id}" data-order-number="${o.orderNumber}"
             class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 transition-all duration-200 hover:shadow-xl hover:-translate-y-1">
          <div class="flex justify-between items-start flex-wrap gap-4">

            <div>
              <div class="flex items-center gap-3">
                <div class="text-2xl font-extrabold tracking-tight">#${o.orderNumber}</div>
                <span class="px-3 py-1 rounded-full text-xs font-semibold border ${statusBadge(st)}">
                  ${STATUS_LABEL[st] ?? st}
                </span>
              </div>

              <div class="text-sm text-slate-500 mt-2">${fmtDateTime(o.createdAt)}</div>

              <div class="mt-4">
                <div class="text-xs uppercase tracking-wide text-slate-400">Total</div>
                <div class="text-3xl font-extrabold text-slate-900">$ ${money(o.total)}</div>
              </div>
            </div>

            <div class="flex gap-2 flex-wrap justify-end">
              ${actions.join("")}
            </div>

          </div>
        </div>
      `;
    }).join("");

    el.querySelectorAll("button[data-action='set']").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-id");
        const st = parseInt(btn.getAttribute("data-status"), 10);

        try {
          toastShow("Actualizando estado...", "info");
          await updateStatus(id, st);
          await refresh();
          toastUpdate("Estado actualizado", "success", 1800);

          if (st === 1) await openOrderDetail(Number(id));
        } catch (e) {
          console.error(e);
          toastUpdate("Error al actualizar estado", "error", 2500);
        }
      });
    });

    el.querySelectorAll("button[data-action='detail']").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id = Number(btn.getAttribute("data-id"));
        await openOrderDetail(id);
      });
    });

    el.querySelectorAll("button[data-action='cancel']").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        const card = btn.closest("[data-order]");
        const orderNumber = card?.getAttribute("data-order-number") || null;

        openCancelModal(id, orderNumber, async () => {
          await refresh();
          await checkNewOrders();
        });
      });
    });
  }

  async function refresh() {
    if (isRefreshing) return;
    isRefreshing = true;

    const refreshBtn = document.getElementById("refresh");
    const oldText = refreshBtn.textContent;
    refreshBtn.textContent = "Cargando...";
    refreshBtn.disabled = true;

    try {
      const orders = await fetchOrders();
      renderOrders(orders);
    } finally {
      refreshBtn.textContent = oldText;
      refreshBtn.disabled = false;
      isRefreshing = false;
    }
  }

  let lastNewCount = 0;
  async function checkNewOrders() {
    try {
      const count = await fetchNewCountToday();

      if (count > 0 && count !== lastNewCount) {
        showNewBanner(count);

        if (count > lastNewCount && soundUnlocked) {
          playNewOrderSound(false);
        }
      }

      if (count === 0) hideNewBanner();
      lastNewCount = count;
    } catch {}
  }

  // =========================
  // INIT
  // =========================
  (async function init() {
    try {
      if(!requireAuth()) return;

      CONFIG = await loadConfig();

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      document.getElementById("date").value = `${yyyy}-${mm}-${dd}`;

      document.getElementById("status").value = "1";

      document.getElementById("btnEnableSound").addEventListener("click", async () => {
        toastShow("Activando sonido...", "info");
        const ok = await unlockAudio(true);
        if (ok) toastUpdate("Sonido activado ✅", "success", 1500);
        else toastUpdate("No pude activar el sonido", "error", 2500);
      });

      document.getElementById("date").addEventListener("change", async () => {
        await refresh();
        await checkNewOrders();
      });

      document.getElementById("status").addEventListener("change", () => refresh());
      document.getElementById("refresh").addEventListener("click", () => refresh());

      document.getElementById("goNew").addEventListener("click", async () => {
        try {
          toastShow("Cargando pedidos nuevos...", "info");
          const news = await fetchNewOrders();
          renderNewModal(news);
          openNewModal();
          toastClear();
        } catch (e) {
          console.error(e);
          toastUpdate("No pude cargar los nuevos", "error", 2500);
        }
      });

      document.getElementById("dismissNew").addEventListener("click", () => hideNewBanner());
      document.getElementById("closeNewModal").addEventListener("click", () => closeNewModal());

      document.getElementById("newModal").addEventListener("click", (e) => {
        if (e.target.id === "newModal") closeNewModal();
      });

      document.getElementById("closeDetailModal").addEventListener("click", closeDetailModal);
      document.getElementById("detailModal").addEventListener("click", (e) => {
        if (e.target.id === "detailModal") closeDetailModal();
      });

      document.getElementById("closeCancelModal").addEventListener("click", closeCancelModal);
      document.getElementById("btnCancelBack").addEventListener("click", closeCancelModal);
      document.getElementById("btnCancelConfirm").addEventListener("click", confirmCancel);
      document.getElementById("cancelModal").addEventListener("click", (e) => {
        if (e.target.id === "cancelModal") closeCancelModal();
      });

      await refresh();
      await checkNewOrders();

      setInterval(checkNewOrders, 10000);

      setInterval(async () => {
        const status = document.getElementById("status").value;
        const modalOpen = !document.getElementById("newModal").classList.contains("hidden");
        if (status === "1" && !modalOpen) await refresh();
      }, 15000);

    } catch (e) {
      console.error(e);
      toastShow("Error ❌ " + (e.message || e), "error");
      toastAutoClose(3000);
    }
  })();
  </script>

</body>
