<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estado del pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#0f172a;
      --ink-2:#1e293b;
      --muted:#64748b;
      --line:#e2e8f0;
      --soft:#f8fafc;
      --soft-2:#f1f5f9;
      --accent:#5b4ef8;
      --accent-2:#7c6ffc;
      --ok:#16a34a;
      --warn:#f59e0b;
      --bad:#dc2626;
    }

    body{
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91,78,248,.08) 0%, transparent 30%),
        radial-gradient(circle at bottom right, rgba(124,111,252,.06) 0%, transparent 35%),
        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      min-height:100vh;
      color:var(--ink);
    }

    h1,h2,h3,.font-display{
      font-family:'Plus Jakarta Sans',sans-serif;
    }

    .payment-shell{
      position:relative;
      z-index:1;
    }

    .payment-card{
      background:rgba(255,255,255,.92);
      backdrop-filter: blur(18px);
      border:1px solid rgba(226,232,240,.9);
      box-shadow:
        0 20px 50px rgba(15,23,42,.10),
        0 8px 24px rgba(15,23,42,.05);
    }

    .status-ring{
      width:96px;
      height:96px;
      border-radius:9999px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto;
      position:relative;
      transition:all .25s ease;
    }

    .status-ring::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:9999px;
      background:white;
      z-index:0;
    }

    .status-icon{
      position:relative;
      z-index:1;
      font-size:40px;
      line-height:1;
    }

    .status-neutral{
      background:linear-gradient(135deg, rgba(91,78,248,.16), rgba(124,111,252,.08));
      border:1px solid rgba(91,78,248,.18);
      box-shadow:0 10px 30px rgba(91,78,248,.12);
    }

    .status-approved{
      background:linear-gradient(135deg, rgba(22,163,74,.18), rgba(34,197,94,.10));
      border:1px solid rgba(22,163,74,.18);
      box-shadow:0 10px 30px rgba(22,163,74,.14);
    }

    .status-warning{
      background:linear-gradient(135deg, rgba(245,158,11,.18), rgba(251,191,36,.10));
      border:1px solid rgba(245,158,11,.18);
      box-shadow:0 10px 30px rgba(245,158,11,.14);
    }

    .status-rejected{
      background:linear-gradient(135deg, rgba(220,38,38,.18), rgba(248,113,113,.10));
      border:1px solid rgba(220,38,38,.18);
      box-shadow:0 10px 30px rgba(220,38,38,.14);
    }

    .info-box{
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border:1px solid var(--line);
    }

    .hint-box{
      border-radius:18px;
      padding:14px 16px;
      font-size:14px;
      line-height:1.5;
      text-align:left;
    }

    .hint-warning{
      background:#fff7ed;
      border:1px solid #fed7aa;
      color:#9a3412;
    }

    .hint-info{
      background:#eff6ff;
      border:1px solid #bfdbfe;
      color:#1d4ed8;
    }

    .btn-main{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px 18px;
      font-weight:800;
      font-family:'Plus Jakarta Sans',sans-serif;
      transition:all .2s ease;
      cursor:pointer;
    }

    .btn-main:hover{
      transform:translateY(-1px);
    }

    .btn-wpp{
      background:#16a34a;
      color:white;
      box-shadow:0 10px 25px rgba(22,163,74,.18);
    }

    .btn-wpp:hover{
      background:#15803d;
    }

    .btn-menu{
      background:var(--ink);
      color:white;
      box-shadow:0 10px 25px rgba(15,23,42,.16);
    }

    .btn-menu:hover{
      background:var(--ink-2);
    }

    .mini-label{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:11px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#94a3b8;
    }

    .top-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:9999px;
      padding:8px 14px;
      background:rgba(91,78,248,.08);
      color:#4338ca;
      border:1px solid rgba(91,78,248,.12);
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .loading-dots span{
      display:inline-block;
      animation:bounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2){ animation-delay:.15s; }
    .loading-dots span:nth-child(3){ animation-delay:.3s; }

    @keyframes bounce{
      0%,80%,100%{ transform:translateY(0); opacity:.45; }
      40%{ transform:translateY(-3px); opacity:1; }
    }
  </style>
</head>

<body class="flex items-center justify-center p-4 md:p-6">

  <div class="payment-shell w-full max-w-xl">
    <div class="payment-card rounded-[30px] p-6 md:p-9">

      <div class="text-center mb-7">
        <div class="top-badge mb-5">
          <span>Mercado Pago</span>
        </div>

        <div id="statusRing" class="status-ring status-neutral mb-5">
          <div id="icon" class="status-icon">⏳</div>
        </div>

        <h1 id="title" class="font-display text-[28px] md:text-[34px] font-extrabold tracking-[-0.03em] text-slate-900 mb-2">
          Verificando pago
        </h1>

        <p id="message" class="text-slate-500 text-[15px] leading-7 max-w-md mx-auto">
          Estamos confirmando tu pago. Esto puede tardar unos segundos...
        </p>
      </div>

      <div id="order-info" class="hidden info-box rounded-[22px] p-5 mb-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <div class="mini-label mb-1">Pedido</div>
            <div id="orderNumberValue" class="text-slate-900 font-bold text-[15px]">-</div>
          </div>
          <div>
            <div class="mini-label mb-1">Pago</div>
            <div id="paymentIdValue" class="text-slate-900 font-bold text-[15px] break-all">-</div>
          </div>
        </div>
      </div>

      <div id="hint-box" class="hidden mb-5"></div>

      <div id="progressBox" class="flex items-center justify-center gap-2 text-sm text-slate-500 mb-6">
        <span>Consultando estado</span>
        <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <div class="space-y-3">
        <button id="btn-wpp" class="hidden btn-main btn-wpp">
          <span>Enviar pedido por WhatsApp</span>
        </button>

        <button id="btn-menu" class="hidden btn-main btn-menu">
          <span>Volver al menú</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const paymentId = params.get("payment_id");
    const checkoutId = params.get("external_reference");
    const statusFromMp = params.get("status");
    const companySlug = params.get("company");

    const icon = document.getElementById("icon");
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const orderInfo = document.getElementById("order-info");
    const hintBox = document.getElementById("hint-box");
    const btnWpp = document.getElementById("btn-wpp");
    const btnMenu = document.getElementById("btn-menu");
    const progressBox = document.getElementById("progressBox");
    const statusRing = document.getElementById("statusRing");
    const orderNumberValue = document.getElementById("orderNumberValue");
    const paymentIdValue = document.getElementById("paymentIdValue");

    const apiBaseUrl = "https://gourmet-backend-1.onrender.com";

    const menuUrl = companySlug
      ? `https://jonamayo9.github.io/MenuOnline/index.html?companySlug=${encodeURIComponent(companySlug)}`
      : "https://jonamayo9.github.io/MenuOnline/index.html";

    const maxAttempts = 8;
    const retryDelayMs = 3000;
    let currentAttempt = 0;

    function setState(type) {
      statusRing.classList.remove("status-neutral", "status-approved", "status-warning", "status-rejected");

      if (type === "approved") statusRing.classList.add("status-approved");
      else if (type === "warning") statusRing.classList.add("status-warning");
      else if (type === "rejected") statusRing.classList.add("status-rejected");
      else statusRing.classList.add("status-neutral");
    }

    function showMenuButton() {
      btnMenu.classList.remove("hidden");
      btnMenu.onclick = () => {
        window.location.href = menuUrl;
      };
    }

    function showOrderInfo(orderNumber) {
      orderInfo.classList.remove("hidden");
      orderNumberValue.textContent = orderNumber || checkoutId || "-";
      paymentIdValue.textContent = paymentId || "-";
    }

    function showHint(text, variant = "warning") {
      hintBox.classList.remove("hidden");
      hintBox.className = "mb-5 hint-box " + (variant === "info" ? "hint-info" : "hint-warning");
      hintBox.textContent = text;
    }

    function clearHint() {
      hintBox.classList.add("hidden");
      hintBox.textContent = "";
    }

    function hideProgress() {
      progressBox.classList.add("hidden");
    }

    function showApproved(data) {
      setState("approved");
      icon.textContent = "✅";
      title.textContent = "¡Pago aprobado!";
      message.textContent = data.message || "Tu pago fue aprobado y tu pedido fue enviado al local.";
      clearHint();
      hideProgress();
      showOrderInfo(data.orderNumber);

      if (data.whatsappUrl) {
        btnWpp.classList.remove("hidden");
        btnWpp.textContent = "Enviar pedido por WhatsApp";
        btnWpp.onclick = () => {
          window.location.href = data.whatsappUrl;
        };
      }

      showMenuButton();
    }

    function showStillVerifying(data) {
      setState("neutral");
      icon.textContent = "⏳";
      title.textContent = "Verificando pago";
      message.textContent = data.message || "Estamos confirmando tu pago. Esto puede tardar unos segundos...";
      showOrderInfo(data.orderNumber);
      showHint("No cierres esta pantalla. Si ya pagaste, no vuelvas a intentarlo.", "info");
    }

    function showPendingFinal(data) {
      setState("warning");
      icon.textContent = "⚠️";
      title.textContent = "Pago en revisión";
      message.textContent = "Todavía no pudimos confirmarlo desde el sistema.";
      showOrderInfo(data.orderNumber);
      showHint("Si ya realizaste el pago, no lo repitas. Esperá unos segundos más o comunicate con el local.");
      hideProgress();
      showMenuButton();

      if (data.whatsappUrl) {
        btnWpp.classList.remove("hidden");
        btnWpp.textContent = "Contactar por WhatsApp";
        btnWpp.onclick = () => {
          window.location.href = data.whatsappUrl;
        };
      }
    }

    function showRejected(data) {
      setState("rejected");
      icon.textContent = "✕";
      title.textContent = "Pago no aprobado";
      message.textContent = data.message || "El pago no fue aprobado. No se generó ningún pedido.";
      showOrderInfo(data.orderNumber);
      clearHint();
      hideProgress();
      showMenuButton();
    }

    function showValidationError(text) {
      setState("warning");
      icon.textContent = "⚠️";
      title.textContent = "No se pudo validar el pago";
      message.textContent = text;
      clearHint();
      hideProgress();
      showMenuButton();
    }

    async function fetchPaymentStatus() {
      const url = `${apiBaseUrl}/api/public/${encodeURIComponent(companySlug)}/payments/mercadopago/confirm?checkoutId=${encodeURIComponent(checkoutId || "")}&paymentId=${encodeURIComponent(paymentId || "")}`;

      const response = await fetch(url, {
        method: "GET",
        headers: {
          "Content-Type": "application/json"
        }
      });

      let data = null;
      try {
        data = await response.json();
      } catch {
        data = null;
      }

      if (!response.ok) {
        throw new Error(data?.message || "Error al validar el pago");
      }

      return data;
    }

    async function verifyPayment() {
      if (!companySlug) {
        showValidationError("No llegó la empresa del pedido.");
        return;
      }

      if (!checkoutId) {
        showValidationError("No llegó el identificador del pago.");
        return;
      }

      if (!paymentId && statusFromMp !== "approved") {
        showValidationError("No llegaron datos suficientes para validar el pago.");
        return;
      }

      while (currentAttempt < maxAttempts) {
        currentAttempt++;

        try {
          const data = await fetchPaymentStatus();

          if (data?.approved === true) {
            showApproved(data);
            return;
          }

          showStillVerifying(data || {});

          if (currentAttempt < maxAttempts) {
            await new Promise(resolve => setTimeout(resolve, retryDelayMs));
          }
        } catch (error) {
          console.error("Error verificando pago:", error);

          if (currentAttempt < maxAttempts) {
            showStillVerifying({});
            await new Promise(resolve => setTimeout(resolve, retryDelayMs));
          } else {
            setState("warning");
            icon.textContent = "⚠️";
            title.textContent = "No pudimos confirmarlo todavía";
            message.textContent = "Hubo un problema al verificar el pago.";
            showHint("Si ya pagaste, no lo vuelvas a pagar. Podés volver al menú o comunicarte con el local.");
            hideProgress();
            showMenuButton();
          }
        }
      }

      showPendingFinal({});
    }

    verifyPayment();
  </script>

</body>
</html>
