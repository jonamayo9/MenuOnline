<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago aprobado</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div class="bg-white rounded-3xl shadow-xl p-10 text-center max-w-md">

<div class="text-5xl mb-4">✅</div>

<h1 class="text-2xl font-black mb-2">
Pago aprobado
</h1>

<p class="text-slate-500 mb-6">
Tu pago fue confirmado correctamente.
</p>

<button
id="btn-wpp"
class="bg-green-600 text-white px-6 py-4 rounded-2xl font-bold w-full">

Enviar pedido por WhatsApp

</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const orderNumber = params.get("external_reference")
const paymentId = params.get("payment_id")

document.getElementById("btn-wpp").onclick = () => {

const mensaje = `Hola! Te envio mi pedido pagado.\nPedido: ${orderNumber}\nPago MercadoPago: ${paymentId}`

const telefono = "54911XXXXXXXX"

window.location.href =
`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`

}

</script>

</body>
</html>
