<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago pendiente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91,78,248,.08) 0%, transparent 30%),
        radial-gradient(circle at bottom right, rgba(124,111,252,.06) 0%, transparent 35%),
        linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
      min-height:100vh;
    }

    h1{
      font-family:'Plus Jakarta Sans',sans-serif;
    }

    .card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(18px);
      border:1px solid rgba(226,232,240,.9);
      box-shadow:
        0 20px 50px rgba(15,23,42,.10),
        0 8px 24px rgba(15,23,42,.05);
    }

    .status-ring{
      width:96px;
      height:96px;
      border-radius:9999px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto;
      background:linear-gradient(135deg, rgba(245,158,11,.18), rgba(251,191,36,.10));
      border:1px solid rgba(245,158,11,.18);
      box-shadow:0 10px 30px rgba(245,158,11,.14);
    }

    .status-icon{
      font-size:42px;
    }

    .info-box{
      background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
      border:1px solid #e2e8f0;
    }

    .hint-box{
      background:#fff7ed;
      border:1px solid #fed7aa;
      color:#9a3412;
    }

    .btn-main{
      width:100%;
      border-radius:18px;
      padding:15px;
      font-weight:800;
      font-family:'Plus Jakarta Sans',sans-serif;
      transition:all .2s ease;
    }

    .btn-main:hover{
      transform:translateY(-1px);
    }

    .btn-dark{
      background:#0f172a;
      color:white;
      box-shadow:0 10px 25px rgba(15,23,42,.16);
    }

    .btn-dark:hover{
      background:#1e293b;
    }

    .btn-light{
      background:white;
      color:#0f172a;
      border:1px solid #cbd5e1;
    }

    .btn-light:hover{
      background:#f8fafc;
    }

    .label{
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#94a3b8;
      font-weight:700;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:9999px;
      padding:8px 14px;
      background:rgba(91,78,248,.08);
      color:#4338ca;
      border:1px solid rgba(91,78,248,.12);
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
  </style>
</head>

<body class="flex items-center justify-center p-4">

  <div class="max-w-xl w-full">
    <div class="card rounded-[30px] p-8 md:p-10 text-center">

      <div class="badge mb-6">
        Mercado Pago
      </div>

      <div class="status-ring mb-5">
        <div class="status-icon">⏳</div>
      </div>

      <h1 class="text-[30px] font-extrabold mb-2 text-slate-900">
        Pago pendiente
      </h1>

      <p class="text-slate-500 mb-6 leading-relaxed">
        Tu pago quedó pendiente de confirmación.<br>
        En unos instantes debería actualizarse.
      </p>

      <div class="info-box rounded-[20px] p-5 mb-5 text-left text-sm space-y-4">
        <div>
          <div class="label mb-1">Referencia de pago</div>
          <div id="paymentValue" class="font-bold text-slate-900 break-all">-</div>
        </div>

        <div>
          <div class="label mb-1">Checkout</div>
          <div id="checkoutValue" class="font-bold text-slate-900">-</div>
        </div>

        <div>
          <div class="label mb-1">Estado</div>
          <div id="statusValue" class="font-bold text-amber-600">-</div>
        </div>
      </div>

      <div class="hint-box rounded-[18px] p-4 text-sm text-left mb-6 leading-relaxed">
        Si ya realizaste el pago, no lo repitas. Esperá unos segundos más o comunicate con el local.
      </div>

      <div class="space-y-3">
        <button id="btn-check" class="btn-main btn-dark">
          Verificar nuevamente
        </button>

        <button id="btn-menu" class="btn-main btn-light">
          Volver al menú
        </button>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const companySlug = params.get("company");
    const paymentId = params.get("payment_id");
    const checkoutId = params.get("external_reference");
    const status = params.get("status");

    const paymentValue = document.getElementById("paymentValue");
    const checkoutValue = document.getElementById("checkoutValue");
    const statusValue = document.getElementById("statusValue");

    const btnCheck = document.getElementById("btn-check");
    const btnMenu = document.getElementById("btn-menu");

    paymentValue.textContent = paymentId || "-";
    checkoutValue.textContent = checkoutId || "-";
    statusValue.textContent = status || "pending";

    const menuUrl = companySlug
      ? `https://jonamayo9.github.io/MenuOnline/index.html?companySlug=${encodeURIComponent(companySlug)}`
      : "https://jonamayo9.github.io/MenuOnline/index.html";

    btnCheck.onclick = () => {
      const nextUrl = new URL("https://jonamayo9.github.io/MenuOnline/payment/pago-exito.html");
      for (const [key, value] of params.entries()) {
        nextUrl.searchParams.set(key, value);
      }
      window.location.href = nextUrl.toString();
    };

    btnMenu.onclick = () => {
      window.location.href = menuUrl;
    };
  </script>

</body>
</html>
