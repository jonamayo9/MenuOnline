<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Dev Solutions | Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">

<div id="toastContainer"
     class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
</div>

  <div class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
      
      <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900 uppercase">
          System Dev <span class="text-slate-500 font-light">Solutions</span>
        </h1>
        <p class="text-[13px] tracking-[0.3em] text-slate-400 font-semibold mt-1">Digital Solutions for Local Commerce</p>
      </div>

      <div class="glass-card rounded-[2.5rem] border border-slate-200 shadow-xl p-8 md:p-10">
        <div class="flex items-start justify-between gap-3 mb-8">
          <div>
            <div class="text-2xl font-extrabold text-slate-900">Iniciar sesión</div>
            <div class="text-sm text-slate-500 mt-1" id="subtitle">
              Empresa + email + contraseña.
            </div>
          </div>

          <div class="px-3 py-1 rounded-full text-[10px] uppercase tracking-widest font-bold border bg-amber-50 text-amber-800 border-amber-100" id="pillMode">
            Admin
          </div>
        </div>

        <div class="space-y-4">

          <div class="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3">
            <div>
              <div class="text-sm font-semibold text-slate-800">Soy SuperAdmin</div>
              <div class="text-xs text-slate-500">Entrar sin empresa.</div>
            </div>
            <input id="isSuperAdmin" type="checkbox" class="w-5 h-5 accent-slate-900 cursor-pointer"/>
          </div>

          <div id="companyBox">
            <label class="text-xs text-slate-400 font-bold ml-1 uppercase tracking-tight">Empresa (slug)</label>
            <input id="companySlug" type="text" placeholder="como-en-casa"
              class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-slate-400 transition shadow-sm"/>
          </div>

          <div>
            <label class="text-xs text-slate-400 font-bold ml-1 uppercase tracking-tight">Email</label>
            <input id="email" type="email" placeholder="admin@demo.com"
              class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-slate-400 transition shadow-sm"/>
          </div>

          <div>
            <label class="text-xs text-slate-400 font-bold ml-1 uppercase tracking-tight">Contraseña</label>
            <input id="password" type="password" placeholder="••••••••"
              class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-slate-400 transition shadow-sm"/>
          </div>

          <div id="errorBox"
               class="hidden bg-rose-50 border border-rose-100 text-rose-800 rounded-2xl p-4 text-sm font-medium"></div>

          <button id="btnLogin"
            class="w-full px-5 py-4 rounded-2xl bg-slate-900 text-white font-bold shadow-lg
                   hover:bg-black hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 uppercase tracking-widest text-xs mt-2">
            Entrar al sistema
          </button>

          <div class="flex flex-col items-center gap-4 pt-2">
            <div class="text-[10px] text-slate-400 font-medium">Si vence la sesión, volvés al login.</div>
            <button id="btnClearSession" class="text-[10px] font-bold text-slate-600 hover:text-rose-500 uppercase tracking-tighter transition-colors">
              Borrar sesión guardada
            </button>
          </div>
        </div>
      </div>

      <div id="pillApi" class="hidden text-center mt-4 text-[10px] text-slate-300"></div>

      <div class="mt-8 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
        © MenuOnline | System Dev Solutions
      </div>
    </div>
  </div>

  <script>
    //   PROD
    //const CONFIG_PATH = "/MenuOnline/config.json";
    //  DEV
    const CONFIG_PATH = "../config.json";

    // ✅ redirecciones distintas
    const AFTER_LOGIN_REDIRECT_ADMIN = "/home.html";
    const AFTER_LOGIN_REDIRECT_SUPER = "/companies.html"; // creamos esta después

    const TOKEN_KEY = "menuonline_token";
    const SLUG_KEY  = "menuonline_companySlug";
    const EMAIL_KEY = "menuonline_email";
    const EXP_KEY   = "menuonline_token_exp_utc";
    const IS_SUPER_KEY = "menuonline_isSuperAdmin";

    let activeToast = null;
    function toast(message, type="info", ms=1600){
      const container = document.getElementById("toastContainer");
      if(activeToast){ activeToast.remove(); activeToast = null; }

      const colors = { success:"bg-emerald-500", error:"bg-rose-500", info:"bg-slate-900" };
      const icon = type==="success" ? "✓" : type==="error" ? "⚠" : "⏳";

      const el = document.createElement("div");
el.className = `${colors[type]} text-white px-6 py-5 rounded-2xl shadow-2xl flex items-center gap-3 min-w-[300px]
                transform transition-all duration-200 scale-95 opacity-0 pointer-events-auto`;
      el.innerHTML = `<div class="text-lg font-bold leading-none">${icon}</div>
                      <div class="text-sm font-semibold">${message}</div>`;
      container.appendChild(el);
      activeToast = el;

requestAnimationFrame(()=> el.classList.remove("scale-95","opacity-0"));

      setTimeout(()=>{
        if(activeToast !== el) return;
        el.classList.add("scale-95","opacity-0");
        setTimeout(()=>{ if(activeToast===el) activeToast=null; el.remove(); }, 200);
      }, ms);
    }

function setMessage(msg, type="error"){
  const box = document.getElementById("errorBox");

  if(!msg){
    box.classList.add("hidden");
    box.textContent = "";
    return;
  }

  box.className = "rounded-2xl p-4 text-sm font-medium border";

  if(type === "success"){
    box.classList.add("bg-emerald-50","border-emerald-200","text-emerald-800");
  }else{
    box.classList.add("bg-rose-50","border-rose-100","text-rose-800");
  }

  box.textContent = msg;
  box.classList.remove("hidden");
}

    function clearSession(){
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(SLUG_KEY);
      localStorage.removeItem(EMAIL_KEY);
      localStorage.removeItem(EXP_KEY);
      localStorage.removeItem(IS_SUPER_KEY);
    }

    async function loadConfig(){
      const res = await fetch(CONFIG_PATH, { cache: "no-store" });
      if(!res.ok) throw new Error("No pude leer config.json");
      return await res.json();
    }

    // ========= JWT exp check =========
    function parseJwt(token){
      try{
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const json = decodeURIComponent(atob(base64).split("").map(c => "%" + c.charCodeAt(0).toString(16).padStart(2,"0")).join(""));
        return JSON.parse(json);
      }catch{
        return null;
      }
    }

    function isTokenValid(token){
      const payload = parseJwt(token);
      const exp = payload?.exp;
      if(!exp) return false;
      const now = Math.floor(Date.now() / 1000);
      return exp > now;
    }

    // ✅ detecta rol desde el JWT (claim "role")
    function getRoleFromToken(token){
      const p = parseJwt(token);
      return p?.role || p?.Role || null;
    }

    async function doLogin(apiBaseUrl, companySlugOrEmpty, email, password, isSuper){
        const body = { email, password, companySlug: companySlugOrEmpty };

        const res = await fetch(`${apiBaseUrl}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        // si falla, intentamos leer mensaje y salimos
        if(!res.ok){
            let msg = "No pude iniciar sesión";
            try{ msg = (await res.json())?.message || msg; }catch{}
            throw new Error(msg);
        }

        // ✅ recién acá existe data
        const data = await res.json();
        if(!data?.accessToken) throw new Error("No recibí accessToken");

        // token + exp + email
        localStorage.setItem(TOKEN_KEY, data.accessToken);
        localStorage.setItem(EMAIL_KEY, email);

        if(data.expiresAtUtc) localStorage.setItem(EXP_KEY, data.expiresAtUtc);
        else localStorage.removeItem(EXP_KEY);

        // role (lo guardamos)
        const role = String(data.role || "").toLowerCase();
        localStorage.setItem("menuonline_role", data.role || "");

        // super final: por checkbox o por role que venga del backend
        const isSuperFinal = !!isSuper || role === "superadmin";
        localStorage.setItem(IS_SUPER_KEY, isSuperFinal ? "true" : "false");

        // company slug (solo si NO es super)
        if(!isSuperFinal){
            if(data.companySlug) localStorage.setItem(SLUG_KEY, data.companySlug);
            else localStorage.setItem(SLUG_KEY, companySlugOrEmpty || "");
        } else {
            localStorage.removeItem(SLUG_KEY);
        }

        // validación exp desde JWT (tu función isTokenValid)
        if(!isTokenValid(data.accessToken)){
            clearSession();
            throw new Error("Token inválido o sin vencimiento (exp).");
        }

        // redirect
        const target = isSuperFinal ? AFTER_LOGIN_REDIRECT_SUPER : AFTER_LOGIN_REDIRECT_ADMIN;
        setTimeout(()=> location.href = target, 350);

        return { isSuper: isSuperFinal };
    }

    function applyMode(isSuper){
      const companyBox = document.getElementById("companyBox");
      const subtitle = document.getElementById("subtitle");
      const pill = document.getElementById("pillMode");

      if(isSuper){
        companyBox.classList.add("hidden");
        subtitle.textContent = "Email + contraseña (sin empresa).";
        pill.textContent = "SuperAdmin";
        pill.className = "px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border bg-purple-50 text-purple-800 border-purple-100";
      }else{
        companyBox.classList.remove("hidden");
        subtitle.textContent = "Empresa + email + contraseña.";
        pill.textContent = "Admin";
        pill.className = "px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border bg-amber-50 text-amber-800 border-amber-100";
      }
    }

    (async function init(){
      try{
        const cfg = await loadConfig();
        const api = cfg.apiBaseUrl || "—";
        // Lo mantenemos en el DOM pero oculto como pediste
        document.getElementById("pillApi").textContent = `API: ${api}`;

        // restaurar modo
        const lastIsSuper = localStorage.getItem(IS_SUPER_KEY) === "true";
        document.getElementById("isSuperAdmin").checked = lastIsSuper;
        applyMode(lastIsSuper);

        document.getElementById("isSuperAdmin").addEventListener("change", (e) => {
          const isSuper = e.target.checked;
          applyMode(isSuper);
          localStorage.setItem(IS_SUPER_KEY, isSuper ? "true" : "false");
        });

        // autocompletar slug/email
        if(cfg.companySlug) document.getElementById("companySlug").value = cfg.companySlug;

        const lastSlug = localStorage.getItem(SLUG_KEY);
        const lastEmail = localStorage.getItem(EMAIL_KEY);

        if(!document.getElementById("companySlug").value && lastSlug) document.getElementById("companySlug").value = lastSlug;
        if(lastEmail) document.getElementById("email").value = lastEmail;

        // ✅ si hay token válido, redirigimos según role
        const t = localStorage.getItem(TOKEN_KEY);
        if(t && isTokenValid(t)){
          const role = getRoleFromToken(t);
          const isSuper = String(role).toLowerCase() === "superadmin";
          localStorage.setItem(IS_SUPER_KEY, isSuper ? "true" : "false");
          location.href = isSuper ? AFTER_LOGIN_REDIRECT_SUPER : AFTER_LOGIN_REDIRECT_ADMIN;
          return;
        } else if (t) {
          clearSession();
        }

        document.getElementById("btnClearSession").addEventListener("click", () => {
          clearSession();
          toast("Sesión borrada ✅", "success", 1200);
        });

        document.getElementById("btnLogin").addEventListener("click", async () => {
            setMessage(null);
            const isSuper = document.getElementById("isSuperAdmin").checked;
            const companySlug = document.getElementById("companySlug").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if(!email || !password){
                setMessage("Completá email y contraseña.");
                return;
            }

            if(!isSuper && !companySlug){
                setMessage("Completá empresa, email y contraseña.");
                return;
            }

            try{
                const slugOrEmpty = isSuper ? "" : companySlug;
                await doLogin(cfg.apiBaseUrl, slugOrEmpty, email, password, isSuper);
                setMessage("Bienvenido al sistema ✅", "success");
            }catch(e){
                console.error(e);
                setMessage(e.message || "Error al ingresar", "error");
            }
        });

        ["companySlug","email","password"].forEach(id => {
          const el = document.getElementById(id);
          if(!el) return;
          el.addEventListener("keydown", (e) => {
            if(e.key === "Enter") document.getElementById("btnLogin").click();
          });
        });

      }catch(e){
        console.error(e);
        setError("No pude cargar configuración. Revisá config.json");
        toast("Error cargando config", "error", 2000);
      }
    })();
  </script>
</body>
</html>
