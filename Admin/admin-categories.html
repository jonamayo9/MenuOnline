<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PedidoClick | Categorías</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0f172a;
      --ink-2: #1e293b;
      --ink-3: #334155;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --border: #e2e8f0;
      --border-2: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --surface-3: #eef2ff;
      --accent: #6d28d9;
      --accent-2: #8b5cf6;
      --accent-glow: rgba(109,40,217,0.14);
      --hero-a: #22113d;
      --hero-b: #31165a;
      --hero-c: #1d1033;
      --shadow-soft: 0 20px 60px rgba(10,10,15,0.08), 0 4px 16px rgba(10,10,15,0.04);
      --shadow-card: 0 22px 60px rgba(15,23,42,.08);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
    }

    h1, h2, h3, h4, .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 10% 0%, rgba(109,40,217,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(139,92,246,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(240,240,248,1) 0%, rgba(247,247,251,1) 100%);
    }

    .brand-strip {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(22px);
      box-shadow: 0 10px 30px rgba(15,23,42,0.05);
    }

    .brand-strip-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-logo-shell {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-logo-shell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-logo-fallback {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.04em;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(109,40,217,0.08);
      border: 1px solid rgba(109,40,217,0.10);
      color: var(--accent);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-card {
      background: linear-gradient(145deg, var(--hero-a) 0%, var(--hero-b) 50%, var(--hero-c) 100%);
      border-radius: 30px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(23,16,46,0.22);
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(255,255,255,0.11) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -40px;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
    }

    .module-card{
      position: relative;
      overflow: hidden;
      transition: all .22s ease;
    }

    .module-card::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(109,40,217,.03) 100%);
      pointer-events:none;
    }

    .module-card:hover{
      transform: translateY(-2px);
      box-shadow: 0 28px 70px rgba(15,23,42,.10);
      border-color: rgba(109,40,217,.18);
    }

    .hero-glow::before{
      content:"";
      position:absolute;
      right:-40px;
      top:-40px;
      width:180px;
      height:180px;
      background: radial-gradient(circle, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 70%);
      filter: blur(10px);
      pointer-events:none;
    }

    .field-label{
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#94a3b8;
      font-weight:800;
      margin-bottom:8px;
      font-family:'Plus Jakarta Sans', sans-serif;
    }

    .field-input{
      width:100%;
      border:1px solid #e2e8f0;
      background:#fff;
      border-radius:18px;
      padding:12px 14px;
      font-size:14px;
      color:#0f172a;
      outline:none;
      transition:.18s ease;
      font-family:'DM Sans', sans-serif;
      box-shadow: 0 6px 18px rgba(15,23,42,.03);
    }

    .field-input:focus{
      border-color:#a78bfa;
      box-shadow:0 0 0 3px rgba(167,139,250,.18);
    }

    .soft-btn{
      transition: all .18s ease;
      font-family:'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
    }

    .soft-btn:hover{
      transform: translateY(-1px);
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-family:'Plus Jakarta Sans', sans-serif;
    }

    @media (max-width: 860px) {
      .brand-strip-inner {
        min-height: 64px;
        padding-top: 10px !important;
        padding-bottom: 10px !important;
        gap: 10px;
        flex-wrap: wrap;
      }

      .brand-right {
        width: 100%;
        justify-content: flex-start;
      }

      .brand-chip {
        width: fit-content;
      }
    }

    @media (max-width: 640px) {
      :root {
        --mobile-shell: 430px;
      }

      html, body {
        overflow-x: hidden;
      }

      body {
        background:
          linear-gradient(180deg, #6d28d9 0%, #7c3aed 150px, #f4f7fb 150px, #f8fafc 100%);
      }

      body::before {
        opacity: 0.18;
      }

.bg-animated {
  background:
    radial-gradient(ellipse 70% 55% at 12% 0%, rgba(109,40,217,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 100% 8%, rgba(139,92,246,0.04) 0%, transparent 60%);
}

      .brand-strip {
        background: transparent;
        border-bottom: none;
        backdrop-filter: none;
        box-shadow: none;
      }

      .brand-strip-inner {
        max-width: var(--mobile-shell) !important;
        margin: 0 auto !important;
        padding: 14px 16px 0 !important;
        min-height: unset !important;
        height: auto !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 12px !important;
        flex-wrap: nowrap !important;
      }

      .brand-left {
        min-width: 0 !important;
        gap: 12px !important;
      }

      .brand-logo-shell {
        width: 52px !important;
        height: 52px !important;
      }

      .brand-title {
        color: white !important;
        font-size: 17px !important;
      }

      .brand-subtitle {
        color: rgba(255,255,255,0.72) !important;
        font-size: 9px !important;
        letter-spacing: 0.14em !important;
      }

      .brand-right {
        display: none !important;
      }

      .page-shell {
        max-width: var(--mobile-shell) !important;
        margin: 0 auto !important;
        padding: 14px 16px 110px !important;
      }

      .hero-card {
        border-radius: 28px !important;
        border: 1px solid rgba(255,255,255,0.10) !important;
        box-shadow: 0 18px 40px rgba(20, 20, 40, 0.20);
        overflow: hidden;
      }

      .hero-card.hero-categories {
        padding: 20px !important;
        margin-bottom: 18px !important;
      }

      .hero-card h1 {
        font-size: 28px !important;
        line-height: 1.08 !important;
        margin-bottom: 10px !important;
      }

      .hero-card p {
        font-size: 13px !important;
        line-height: 1.5 !important;
        max-width: none !important;
      }
    }
  </style>
</head>

<body class="text-slate-800 min-h-screen">
  <div class="bg-animated"></div>

    <div class="brand-strip sticky top-0 z-50">
      <div class="brand-strip-inner">

            <img src="../img/iniciales_1.png" alt="PedidoClick" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

  <div id="toastContainer" class="fixed top-6 right-6 z-50"></div>

  <script>
    let CONFIG = null;
    let isRefreshing = false;
    let categoriesCache = [];
    let editingId = null;

    // =========================
    // AUTH GUARD (SIN DUPLICADOS)
    // =========================
    const TOKEN_KEY = "menuonline_token";
    const SLUG_KEY  = "menuonline_companySlug";
    const LOGIN_PAGE = "/Admin/login.html";
    //   PROD
    //const CONFIG_PATH = "/MenuOnline/config.json";
    //  DEV
    const CONFIG_PATH = "/config.json";

    function logoutToLogin(){
      localStorage.removeItem(TOKEN_KEY);
      location.replace(LOGIN_PAGE);
    }

    function parseJwt(token){
      try{
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const json = decodeURIComponent(atob(base64).split("").map(c =>
          "%" + c.charCodeAt(0).toString(16).padStart(2,"0")
        ).join(""));
        return JSON.parse(json);
      }catch{ return null; }
    }

    function isTokenValid(token){
      const payload = parseJwt(token);
      const exp = payload?.exp;
      if(!exp) return false;
      const now = Math.floor(Date.now()/1000);
      return exp > now;
    }

    function requireAuth(){
      const t = localStorage.getItem(TOKEN_KEY);
      if(!t || !isTokenValid(t)){
        logoutToLogin();
        return false;
      }
      return true;
    }

    function authHeaders(extra = {}){
      const token = localStorage.getItem(TOKEN_KEY);
      return { ...extra, "Authorization": "Bearer " + token };
    }

    async function fetchAuth(url, options = {}){
      if(!requireAuth()) return null;

      const res = await fetch(url, {
        ...options,
        headers: authHeaders(options.headers || {})
      });

      if(res.status === 401 || res.status === 403){
        logoutToLogin();
        return null;
      }

      return res;
    }

    function getSlug(){
      return localStorage.getItem(SLUG_KEY) || CONFIG.companySlug;
    }

    // =========================
    // TOAST
    // =========================
    let activeToastEl = null;

    function toastShow(message, type = "info") {
      const container = document.getElementById("toastContainer");

      if (activeToastEl) {
        activeToastEl.remove();
        activeToastEl = null;
      }

      const colors = {
        success: "bg-emerald-500",
        error: "bg-rose-500",
        info: "bg-slate-900"
      };

      const icon = type === "success" ? "✓" : type === "error" ? "⚠" : "⏳";

      const el = document.createElement("div");
      el.className = `
        ${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl
        flex items-center gap-3 min-w-[280px]
        transform transition-all duration-200 translate-y-2 opacity-0
      `;
      el.innerHTML = `
        <div class="text-lg font-bold leading-none">${icon}</div>
        <div class="text-sm font-semibold">${message}</div>
      `;

      container.appendChild(el);
      activeToastEl = el;

      requestAnimationFrame(() => {
        el.classList.remove("translate-y-2", "opacity-0");
      });

      return el;
    }

    function toastUpdate(message, type = "info", autoCloseMs = null) {
      if (!activeToastEl) {
        toastShow(message, type);
        if (autoCloseMs) toastAutoClose(autoCloseMs);
        return;
      }

      const colors = {
        success: "bg-emerald-500",
        error: "bg-rose-500",
        info: "bg-slate-900"
      };

      const icon = type === "success" ? "✓" : type === "error" ? "⚠" : "⏳";

      activeToastEl.className = `
        ${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl
        flex items-center gap-3 min-w-[280px]
        transform transition-all duration-200
      `;
      activeToastEl.innerHTML = `
        <div class="text-lg font-bold leading-none">${icon}</div>
        <div class="text-sm font-semibold">${message}</div>
      `;

      if (autoCloseMs) toastAutoClose(autoCloseMs);
    }

    function toastAutoClose(ms = 1800) {
      const el = activeToastEl;
      if (!el) return;

      setTimeout(() => {
        if (activeToastEl !== el) return;

        el.classList.add("translate-y-2", "opacity-0");
        setTimeout(() => {
          if (activeToastEl === el) activeToastEl = null;
          el.remove();
        }, 200);
      }, ms);
    }

    // =========================
    // API (con auth + slug)
    // =========================
    async function loadConfig() {
      const res = await fetch(CONFIG_PATH, { cache: "no-store" });
      if (!res.ok) throw new Error("No pude leer config.json");
      return await res.json();
    }

    async function apiGetCategories() {
      const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/categories`;
      const res = await fetchAuth(url);
      if(!res) return [];
      if (!res.ok) throw new Error("Error cargando categorías");
      return await res.json();
    }

    async function apiCreateCategory(body) {
      const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/categories`;
      const res = await fetchAuth(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if(!res) return null;
      if (!res.ok) throw new Error("Error creando categoría");
      return await res.json();
    }

    async function apiUpdateCategory(id, body) {
      const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/categories/${id}`;
      const res = await fetchAuth(url, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if(!res) return;
      if (!res.ok) throw new Error("Error actualizando categoría");
    }

    async function apiDeleteCategory(id) {
      const url = `${CONFIG.apiBaseUrl}/api/admin/${getSlug()}/categories/${id}`;
      const res = await fetchAuth(url, { method: "DELETE" });
      if(!res) return;
      if (!res.ok) throw new Error("Error eliminando categoría");
    }

    // ===== UI Helpers =====
    function badge(enabled) {
      return enabled
        ? "bg-emerald-50 text-emerald-800 border-emerald-100"
        : "bg-rose-50 text-rose-800 border-rose-100";
    }

    function resetForm() {
      editingId = null;
      document.getElementById("formTitle").textContent = "Nueva categoría";
      document.getElementById("formSubtitle").textContent = "Completá los datos y guardá.";
      document.getElementById("editBadge").classList.add("hidden");
      document.getElementById("cancelEdit").classList.add("hidden");
      document.getElementById("save").textContent = "Crear";

      document.getElementById("name").value = "";
      document.getElementById("sortOrder").value = "0";
      document.getElementById("enabled").checked = true;
    }

    function fillForm(cat) {
      editingId = cat.id;

      document.getElementById("formTitle").textContent = "Editar categoría";
      document.getElementById("formSubtitle").textContent = "Modificá los datos y guardá cambios.";
      document.getElementById("editBadge").classList.remove("hidden");
      document.getElementById("cancelEdit").classList.remove("hidden");
      document.getElementById("save").textContent = "Guardar";

      document.getElementById("name").value = cat.name ?? "";
      document.getElementById("sortOrder").value = String(cat.sortOrder ?? 0);
      document.getElementById("enabled").checked = !!cat.enabled;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // ===== Render =====
    function render(items) {
      const el = document.getElementById("list");

      if (!items.length) {
        el.innerHTML = `
          <div class="glass-card rounded-[2rem] p-8 text-center">
            <div class="text-5xl mb-3">📂</div>
            <div class="text-xl font-extrabold text-slate-900 font-display">No hay categorías</div>
            <div class="text-sm text-slate-500 mt-2">Creá la primera desde el formulario de arriba.</div>
          </div>`;
        return;
      }

      el.innerHTML = items.map(c => `
        <div class="module-card glass-card rounded-[2rem] p-6">
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div class="min-w-[260px]">
              <div class="flex items-center gap-3 flex-wrap">
                <div class="text-xl font-extrabold tracking-tight text-slate-900 font-display">${c.name}</div>
                <span class="px-3 py-1 rounded-full text-xs font-semibold border ${badge(c.enabled)}">
                  ${c.enabled ? "Habilitada" : "Deshabilitada"}
                </span>
              </div>

              <div class="text-sm text-slate-500 mt-3">
                Orden:
                <span class="font-bold text-slate-800">${c.sortOrder}</span>
              </div>

              <div class="text-xs text-slate-400 mt-1">Id: ${c.id}</div>
            </div>

            <div class="flex gap-2 flex-wrap justify-end">
              <button class="soft-btn px-4 py-3 rounded-2xl bg-slate-100 text-slate-800 hover:bg-slate-200"
                data-edit="1" data-id="${c.id}">
                Editar
              </button>

              <button class="soft-btn px-4 py-3 rounded-2xl bg-rose-100 text-rose-800 hover:bg-rose-200"
                data-del="1" data-id="${c.id}">
                Eliminar
              </button>
            </div>
          </div>
        </div>
      `).join("");

      el.querySelectorAll("button[data-edit='1']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-id"));
          const cat = categoriesCache.find(x => x.id === id);
          if (cat) fillForm(cat);
        });
      });

      el.querySelectorAll("button[data-del='1']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.getAttribute("data-id"));
          if (!confirm("¿Eliminar esta categoría?")) return;

          try {
            toastShow("Eliminando categoría...", "info");
            await apiDeleteCategory(id);
            await refresh();
            toastUpdate("Categoría eliminada", "success", 1800);
            if (editingId === id) resetForm();
          } catch (e) {
            console.error(e);
            toastUpdate("No se pudo eliminar (puede tener productos)", "error", 2500);
          }
        });
      });
    }

    async function refresh() {
      if (isRefreshing) return;
      isRefreshing = true;

      const btn = document.getElementById("refresh");
      const old = btn.textContent;
      btn.textContent = "Cargando...";
      btn.disabled = true;

      try {
        const items = await apiGetCategories();
        categoriesCache = Array.isArray(items) ? items : [];
        render(categoriesCache);
      } finally {
        btn.textContent = old;
        btn.disabled = false;
        isRefreshing = false;
      }
    }

    // ===== Init =====
    (async function init() {
      try {
        if(!requireAuth()) return;

        CONFIG = await loadConfig();

        document.getElementById("refresh").addEventListener("click", refresh);
        document.getElementById("cancelEdit").addEventListener("click", () => resetForm());

        document.getElementById("save").addEventListener("click", async () => {
          const name = document.getElementById("name").value.trim();
          const sortOrder = Number(document.getElementById("sortOrder").value);
          const enabled = document.getElementById("enabled").checked;

          if (!name) { toastShow("Poné un nombre", "error"); toastAutoClose(1800); return; }

          try {
            if (editingId == null) {
              toastShow("Creando categoría...", "info");
              await apiCreateCategory({ name, sortOrder, enabled });
              await refresh();
              toastUpdate("Categoría creada", "success", 1800);
              resetForm();
            } else {
              toastShow("Guardando cambios...", "info");
              await apiUpdateCategory(editingId, { name, sortOrder, enabled });
              await refresh();
              toastUpdate("Categoría actualizada", "success", 1800);
              resetForm();
            }
          } catch (e) {
            console.error(e);
            toastUpdate("Error guardando categoría", "error", 2500);
          }
        });

        resetForm();
        await refresh();
      } catch (e) {
        console.error(e);
        toastShow("Error ❌ " + (e.message || e), "error");
        toastAutoClose(3000);
      }
    })();
  </script>
</body>
</html>
