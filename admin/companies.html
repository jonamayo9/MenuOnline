<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperAdmin · Empresas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="bg-white rounded-3xl shadow-sm p-6 mb-6 border border-slate-200">
      <div class="flex items-start md:items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3">
          <button id="btnLogout"
            class="px-4 py-2 rounded-2xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
            Salir
          </button>

          <div>
            <h1 class="text-3xl font-extrabold tracking-tight">Empresas</h1>
            <p class="text-sm text-slate-500 mt-1">ABM de empresas (solo SuperAdmin).</p>
          </div>
        </div>

        <button id="refresh"
          class="px-5 py-3 rounded-2xl bg-slate-900 text-white font-semibold shadow hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
          Actualizar
        </button>
      </div>
    </div>

    <!-- CREATE FORM (solo crear, NO editar) -->
    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 mb-6">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <div class="text-lg font-extrabold">Nueva empresa</div>
          <div class="text-sm text-slate-500 mt-1">Creá una empresa (slug único).</div>
        </div>
      </div>

      <div class="mt-5 grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
        <!-- Slug -->
        <div class="md:col-span-3 flex flex-col">
          <label class="text-xs text-slate-400 mb-1 block">Slug (único)</label>
          <input id="c_slug" placeholder="ej: como-en-casa"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
          <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">Solo letras/números/guiones.</div>
        </div>

        <!-- Nombre -->
        <div class="md:col-span-4 flex flex-col">
          <label class="text-xs text-slate-400 mb-1 block">Nombre</label>
          <input id="c_name" placeholder="Ej: COMO EN CASA"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
          <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
        </div>

        <!-- Estado -->
        <div class="md:col-span-2 flex flex-col">
          <label class="text-xs text-slate-400 mb-1 block">Estado</label>
          <select id="c_enabled"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
            <option value="true">Habilitada</option>
            <option value="false">Deshabilitada</option>
          </select>
          <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
        </div>

        <!-- Crear -->
        <div class="md:col-span-3 flex flex-col justify-end">
          <div class="text-[11px] text-slate-400 mb-1 min-h-[16px]">&nbsp;</div>
          <button id="btnCreate"
            class="w-full px-5 py-3 rounded-2xl bg-emerald-100 text-emerald-800 font-semibold hover:bg-emerald-200 transition">
            Crear
          </button>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="flex justify-end items-center mb-3">
      <div class="text-sm text-slate-500" id="summary"></div>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-4"></div>
  </div>

  <!-- MODAL EDIT (completo) -->
  <div id="modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-3xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-200 flex items-center justify-between">
        <div>
          <div class="text-xl font-extrabold">Editar empresa</div>
          <div id="m_sub" class="text-sm text-slate-500 mt-1">—</div>
        </div>

        <button id="m_close" class="px-3 py-2 rounded-xl hover:bg-slate-100">✕</button>
      </div>

      <div class="p-6 space-y-5">
        <!-- Info -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
            <div class="text-xs text-slate-400 font-semibold">Id</div>
            <div id="m_id" class="font-extrabold mt-1">—</div>
          </div>
          <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
            <div class="text-xs text-slate-400 font-semibold">Creada</div>
            <div id="m_created" class="font-extrabold mt-1">—</div>
          </div>
          <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
            <div class="text-xs text-slate-400 font-semibold">Slug</div>
            <div id="m_slug_readonly" class="font-extrabold mt-1">—</div>
          </div>
        </div>

        <!-- Form -->
        <input id="m_id_hidden" type="hidden" />
        <input id="m_logoUrl_hidden" type="hidden" />

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
          <div class="md:col-span-4 flex flex-col">
            <label class="text-xs text-slate-400 mb-1 block">Nombre</label>
            <input id="m_name"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
            <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
          </div>

          <div class="md:col-span-3 flex flex-col">
            <label class="text-xs text-slate-400 mb-1 block">WhatsApp</label>
            <input id="m_whatsapp" placeholder="54911..."
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"/>
            <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
          </div>

          <div class="md:col-span-3 flex flex-col">
            <label class="text-xs text-slate-400 mb-1 block">Alias MP</label>
            <input id="m_alias" placeholder="ALIAS.MP"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"/>
            <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
          </div>

          <div class="md:col-span-2 flex flex-col">
            <label class="text-xs text-slate-400 mb-1 block">Estado</label>
            <select id="m_enabled"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
              <option value="true">Habilitada</option>
              <option value="false">Deshabilitada</option>
            </select>
            <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">&nbsp;</div>
          </div>

          <!-- Logo -->
          <div class="md:col-span-6 flex flex-col">
            <label class="text-xs text-slate-400 mb-1 block">Logo (archivo)</label>
            <input id="m_logoFile" type="file" accept="image/*"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"/>
            <div class="text-[11px] text-slate-400 mt-1 min-h-[16px]">Se sube y se guarda la URL en la empresa.</div>
          </div>

          <div class="md:col-span-6 flex items-end gap-3">
            <img id="m_logoPreview" class="w-20 h-20 object-cover rounded-2xl border border-slate-200 hidden" />
            <button id="m_clearLogo"
              class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
              Quitar logo
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-2 flex-wrap pt-2">
          <button id="m_cancel"
            class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
            Cancelar
          </button>

          <button id="m_save"
            class="px-5 py-3 rounded-2xl bg-emerald-100 text-emerald-800 font-semibold hover:bg-emerald-200 transition">
            Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed top-6 right-6 z-50"></div>

  <script>
    let CONFIG = null;
    let isRefreshing = false;
    let companiesCache = [];

    // modal state
    let modalOpen = false;
    let modalLogoFile = null;

    // =========================
    // AUTH GUARD
    // =========================
    const TOKEN_KEY = "menuonline_token";
    const SLUG_KEY  = "menuonline_companySlug";
    const LOGIN_PAGE = "../login.html";
    const CONFIG_PATH = "../config.json";

    const EXP_KEY   = "menuonline_token_exp_utc";
    const LEEWAY_MS = 30000;

    function logoutToLogin(){
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(EXP_KEY);
      localStorage.removeItem(SLUG_KEY);
      localStorage.removeItem("menuonline_role");
      localStorage.removeItem("menuonline_isSuperAdmin");
      location.replace(LOGIN_PAGE);
    }

    function isSessionValid(){
      const token = localStorage.getItem(TOKEN_KEY);
      const expUtc = localStorage.getItem(EXP_KEY);
      if(!token || !expUtc) return false;

      const expMs = Date.parse(expUtc);
      if(Number.isNaN(expMs)) return false;

      return (Date.now() + LEEWAY_MS) < expMs;
    }

    function requireAuth(){
      if(!isSessionValid()){
        logoutToLogin();
        return false;
      }
      return true;
    }

    function authHeaders(extra = {}){
      const token = localStorage.getItem(TOKEN_KEY);
      return { ...extra, "Authorization": "Bearer " + token };
    }

    async function fetchAuth(url, options = {}){
      if(!requireAuth()) return null;

      const res = await fetch(url, {
        ...options,
        headers: authHeaders(options.headers || {})
      });

      if(res.status === 401 || res.status === 403){
        logoutToLogin();
        return null;
      }
      return res;
    }

    // =========================
    // TOAST
    // =========================
    let activeToastEl = null;

    function toastShow(message, type = "info") {
      const container = document.getElementById("toastContainer");
      if (activeToastEl) { activeToastEl.remove(); activeToastEl = null; }

      const colors = { success:"bg-emerald-500", error:"bg-rose-500", info:"bg-slate-900" };
      const icon = type==="success" ? "✓" : type==="error" ? "⚠" : "⏳";

      const el = document.createElement("div");
      el.className = `${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 min-w-[280px]
                      transform transition-all duration-200 translate-y-2 opacity-0`;
      el.innerHTML = `<div class="text-lg font-bold leading-none">${icon}</div>
                      <div class="text-sm font-semibold">${message}</div>`;
      container.appendChild(el);
      activeToastEl = el;

      requestAnimationFrame(()=> el.classList.remove("translate-y-2","opacity-0"));
      return el;
    }

    function toastUpdate(message, type="info", autoCloseMs = null){
      if(!activeToastEl){ toastShow(message, type); if(autoCloseMs) toastAutoClose(autoCloseMs); return; }
      const colors = { success:"bg-emerald-500", error:"bg-rose-500", info:"bg-slate-900" };
      const icon = type==="success" ? "✓" : type==="error" ? "⚠" : "⏳";
      activeToastEl.className = `${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 min-w-[280px]
                      transform transition-all duration-200`;
      activeToastEl.innerHTML = `<div class="text-lg font-bold leading-none">${icon}</div>
                      <div class="text-sm font-semibold">${message}</div>`;
      if(autoCloseMs) toastAutoClose(autoCloseMs);
    }

    function toastAutoClose(ms=1800){
      const el = activeToastEl;
      if(!el) return;
      setTimeout(()=>{
        if(activeToastEl !== el) return;
        el.classList.add("translate-y-2","opacity-0");
        setTimeout(()=>{ if(activeToastEl===el) activeToastEl=null; el.remove(); }, 200);
      }, ms);
    }

    // =========================
    // HELPERS
    // =========================
    function setSummary(items){
      document.getElementById("summary").textContent = items.length ? `${items.length} empresa(s)` : "";
    }

    function badge(enabled){
      return enabled
        ? "bg-emerald-50 text-emerald-800 border-emerald-100"
        : "bg-rose-50 text-rose-800 border-rose-100";
    }

    function normalizeSlug(raw){
      return String(raw ?? "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^a-z0-9-]/g, "");
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function fmtDate(v){
      if(!v) return "—";
      try { return new Date(v).toLocaleString("es-AR"); } catch { return String(v); }
    }

    // ✅ CLAVE: resolver URL de imagen contra la API
    function buildImageUrl(path){
      if(!path) return "";
      if(String(path).startsWith("http")) return path;
      if(!CONFIG?.apiBaseUrl) return path;
      return CONFIG.apiBaseUrl + path; // path viene como "/uploads/..."
    }

    // =========================
    // CONFIG + API
    // =========================
    async function loadConfig(){
      const r = await fetch(CONFIG_PATH, { cache: "no-store" });
      if(!r.ok) throw new Error("No pude leer config.json");
      return await r.json();
    }

    async function apiGetCompanies(){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/companies`;
      const r = await fetchAuth(url);
      if(!r) return [];
      if(!r.ok) throw new Error("Error cargando empresas");
      const data = await r.json();
      return Array.isArray(data) ? data : [];
    }

    async function apiCreateCompany(payload){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/companies`;
      return await fetchAuth(url, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function apiUpdateCompany(id, payload){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/companies/${id}`;
      return await fetchAuth(url, {
        method: "PUT",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function apiDeleteCompany(id){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/companies/${id}`;
      return await fetchAuth(url, { method:"DELETE" });
    }

    async function apiUploadLogo(file){
      const fd = new FormData();
      fd.append("file", file);

      const url = `${CONFIG.apiBaseUrl}/api/superadmin/uploads/image`;
      const r = await fetchAuth(url, { method:"POST", body: fd });
      if(!r) return null;

      if(!r.ok){
        const t = await r.text().catch(()=> "");
        console.error("upload error:", t);
        throw new Error("No pude subir el logo (endpoint upload)");
      }

      const data = await r.json().catch(()=> null);
      return data?.url || data?.Url || null; // tu backend devuelve { url }
    }

    // =========================
    // RENDER
    // =========================
    function render(items){
      const el = document.getElementById("list");
      setSummary(items);

      if(!items.length){
        el.innerHTML = `
          <div class="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
            <div class="font-semibold">No hay empresas</div>
            <div class="text-sm text-slate-600 mt-1">Creá la primera desde el formulario.</div>
          </div>`;
        return;
      }

      el.innerHTML = items.map(c => `
        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 transition-all duration-200 hover:shadow-xl hover:-translate-y-1">
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div class="min-w-[280px]">
              <div class="flex items-center gap-3 flex-wrap">
                <div class="text-xl font-extrabold">${escapeHtml(c.name)}</div>
                <span class="px-3 py-1 rounded-full text-xs font-semibold border ${badge(!!c.enabled)}">
                  ${c.enabled ? "Habilitada" : "Deshabilitada"}
                </span>
              </div>

              <div class="text-sm text-slate-500 mt-2">
                Slug: <span class="font-semibold text-slate-800">${escapeHtml(c.slug)}</span>
              </div>

              <div class="text-sm text-slate-500 mt-1">
                WhatsApp: <span class="font-semibold text-slate-800">${escapeHtml(c.whatsapp || "—")}</span>
                · Alias: <span class="font-semibold text-slate-800">${escapeHtml(c.alias || "—")}</span>
              </div>

              <div class="text-xs text-slate-400 mt-2">
                Id: ${c.id}${c.createdAtUtc ? ` · Creada: ${fmtDate(c.createdAtUtc)}` : ""}
              </div>
            </div>

            <div class="flex gap-2 flex-wrap justify-end">
              <button class="px-4 py-2 rounded-xl bg-indigo-100 text-indigo-900 font-semibold hover:bg-indigo-200 transition"
                data-users="1" data-id="${c.id}" data-name="${escapeHtml(c.name)}">
                Usuarios
              </button>

              <button class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition"
                data-edit="1" data-id="${c.id}">
                Editar
              </button>

              <button class="px-4 py-2 rounded-xl bg-rose-100 text-rose-800 font-semibold hover:bg-rose-200 transition"
                data-del="1" data-id="${c.id}">
                Eliminar
              </button>
            </div>
          </div>
        </div>
      `).join("");

      el.querySelectorAll("button[data-edit='1']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-id"));
          const c = companiesCache.find(x => x.id === id);
          if(c) openModal(c);
        });
      });

      el.querySelectorAll("button[data-del='1']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.getAttribute("data-id"));
          const c = companiesCache.find(x => x.id === id);
          if(!confirm(`¿Eliminar empresa "${c?.name || id}"?`)) return;

          try{
            toastShow("Eliminando empresa...", "info");
            const r = await apiDeleteCompany(id);
            if(!r) return;

            if(!r.ok){
              const txt = await r.text().catch(()=> "");
              console.error(txt);
              toastUpdate("No se pudo eliminar (mirá consola)", "error", 2500);
              return;
            }

            toastUpdate("Empresa eliminada", "success", 1800);
            await refresh();
          }catch(e){
            console.error(e);
            toastUpdate("Error al eliminar", "error", 2500);
          }
        });
      });

      el.querySelectorAll("button[data-users='1']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-id"));
          localStorage.setItem("menuonline_manage_companyId", String(id));
          localStorage.setItem("menuonline_manage_companyName", btn.getAttribute("data-name") || "");
          location.href = "./admin-users.html";
        });
      });
    }

    // =========================
    // MODAL
    // =========================
    function openModal(c){
      modalOpen = true;
      modalLogoFile = null;

      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("m_sub").textContent = `Empresa: ${c.name || "—"}`;
      document.getElementById("m_id").textContent = c.id ?? "—";
      document.getElementById("m_created").textContent = fmtDate(c.createdAtUtc);
      document.getElementById("m_slug_readonly").textContent = c.slug ?? "—";

      document.getElementById("m_id_hidden").value = String(c.id || "");
      document.getElementById("m_name").value = c.name ?? "";
      document.getElementById("m_whatsapp").value = c.whatsapp ?? "";
      document.getElementById("m_alias").value = c.alias ?? "";
      document.getElementById("m_enabled").value = String(!!c.enabled);

      document.getElementById("m_logoUrl_hidden").value = c.logoUrl || "";
      const prev = document.getElementById("m_logoPreview");
      const file = document.getElementById("m_logoFile");
      file.value = "";

      if(c.logoUrl){
        prev.src = buildImageUrl(c.logoUrl);       // ✅ FIX
        prev.classList.remove("hidden");
      } else {
        prev.classList.add("hidden");
        prev.removeAttribute("src");
      }
    }

    function closeModal(){
      modalOpen = false;
      modalLogoFile = null;
      document.getElementById("modal").classList.add("hidden");
    }

    // =========================
    // REFRESH
    // =========================
    async function refresh(){
      if(isRefreshing) return;
      isRefreshing = true;

      const btn = document.getElementById("refresh");
      const old = btn.textContent;
      btn.textContent = "Cargando...";
      btn.disabled = true;

      try{
        const items = await apiGetCompanies();
        companiesCache = items;
        render(companiesCache);
      } finally {
        btn.textContent = old;
        btn.disabled = false;
        isRefreshing = false;
      }
    }

    // =========================
    // EVENTS
    // =========================
    document.getElementById("btnLogout").addEventListener("click", logoutToLogin);
    document.getElementById("refresh").addEventListener("click", refresh);

    document.getElementById("c_slug").addEventListener("blur", (e) => {
      e.target.value = normalizeSlug(e.target.value);
    });

    document.getElementById("btnCreate").addEventListener("click", async () => {
      const slug = normalizeSlug(document.getElementById("c_slug").value);
      const name = (document.getElementById("c_name").value || "").trim();
      const enabled = document.getElementById("c_enabled").value === "true";

      if(!slug){ toastShow("Slug requerido", "error"); toastAutoClose(1800); return; }
      if(!name){ toastShow("Nombre requerido", "error"); toastAutoClose(1800); return; }

      try{
        toastShow("Creando empresa...", "info");
        const payload = { slug, name, enabled };
        const r = await apiCreateCompany(payload);
        if(!r) return;

        if(r.status === 409){
          toastUpdate("Slug ya existe", "error", 2200);
          return;
        }
        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.error(t);
          toastUpdate("Error creando (mirá consola)", "error", 2500);
          return;
        }

        toastUpdate("Empresa creada", "success", 1800);
        document.getElementById("c_slug").value = "";
        document.getElementById("c_name").value = "";
        document.getElementById("c_enabled").value = "true";
        await refresh();
      }catch(e){
        console.error(e);
        toastUpdate(e?.message || "Error creando", "error", 2500);
      }
    });

    // modal close
    document.getElementById("m_close").addEventListener("click", closeModal);
    document.getElementById("m_cancel").addEventListener("click", closeModal);

    // ESC to close
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && !document.getElementById("modal").classList.contains("hidden")){
        closeModal();
      }
    });

    // click outside to close
    document.getElementById("modal").addEventListener("click", (e) => {
      if(e.target.id === "modal") closeModal();
    });

    // modal logo change
    document.getElementById("m_logoFile").addEventListener("change", (e) => {
      modalLogoFile = e.target.files?.[0] ?? null;
      const prev = document.getElementById("m_logoPreview");
      if(modalLogoFile){
        prev.src = URL.createObjectURL(modalLogoFile);
        prev.classList.remove("hidden");
      }
    });

    document.getElementById("m_clearLogo").addEventListener("click", () => {
      modalLogoFile = null;
      document.getElementById("m_logoFile").value = "";
      document.getElementById("m_logoUrl_hidden").value = "";
      const prev = document.getElementById("m_logoPreview");
      prev.classList.add("hidden");
      prev.removeAttribute("src");
    });

    // modal save
    document.getElementById("m_save").addEventListener("click", async () => {
      const id = Number(document.getElementById("m_id_hidden").value);
      if(!id) return;

      const name = (document.getElementById("m_name").value || "").trim();
      const whatsapp = (document.getElementById("m_whatsapp").value || "").trim();
      const alias = (document.getElementById("m_alias").value || "").trim();
      const enabled = document.getElementById("m_enabled").value === "true";

      if(!name){
        toastShow("Nombre requerido", "error"); toastAutoClose(1800); return;
      }

      try{
        let logoUrl = document.getElementById("m_logoUrl_hidden").value || null;

        if(modalLogoFile){
          toastShow("Subiendo logo...", "info");
          logoUrl = await apiUploadLogo(modalLogoFile);
          if(!logoUrl) throw new Error("No pude subir el logo");
          document.getElementById("m_logoUrl_hidden").value = logoUrl;

          // ✅ si sube, mostramos preview contra API
          const prev = document.getElementById("m_logoPreview");
          prev.src = buildImageUrl(logoUrl);
          prev.classList.remove("hidden");
        }

        toastShow("Guardando cambios...", "info");
        const payload = {
          name,
          whatsapp: whatsapp || null,
          alias: alias || null,
          logoUrl: logoUrl || null,
          enabled
        };

        const r = await apiUpdateCompany(id, payload);
        if(!r) return;

        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.error(t);
          toastUpdate("Error guardando (mirá consola)", "error", 2500);
          return;
        }

        toastUpdate("Empresa actualizada", "success", 1800);
        closeModal();
        await refresh();
      }catch(e){
        console.error(e);
        toastUpdate(e?.message || "Error guardando", "error", 2500);
      }
    });

    // =========================
    // INIT
    // =========================
    (async function init(){
      try{
        if(!requireAuth()) return;
        CONFIG = await loadConfig();
        await refresh();
      }catch(e){
        console.error(e);
        toastShow("Error ❌ " + (e.message || e), "error");
        toastAutoClose(3000);
      }
    })();
  </script>
</body>
</html>
