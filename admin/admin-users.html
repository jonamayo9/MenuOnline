<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperAdmin · Usuarios</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="bg-white rounded-3xl shadow-sm p-6 mb-6 border border-slate-200">
      <div class="flex items-start md:items-center justify-between gap-4 flex-wrap">
        <div>
          <div class="flex items-center gap-3 flex-wrap">
            <button id="btnBackCompanies"
              class="px-4 py-2 rounded-2xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
              ← Empresas
            </button>

            <button id="btnLogout"
              class="px-4 py-2 rounded-2xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
              Salir
            </button>

            <div>
              <h1 class="text-3xl font-extrabold tracking-tight">Usuarios</h1>
              <p class="text-sm text-slate-500 mt-1">
                ABM de usuarios de la empresa:
                <span id="companyName" class="font-semibold text-slate-800">—</span>
                <span class="text-slate-400">(Id:</span><span id="companyIdTxt" class="text-slate-400">—</span><span class="text-slate-400">)</span>
              </p>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-3 flex-wrap">
          <input id="search"
            type="text"
            placeholder="Buscar por email o rol..."
            class="w-72 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>

          <button id="btnOpenCreate"
            class="px-5 py-3 rounded-2xl bg-emerald-100 text-emerald-800 font-semibold hover:bg-emerald-200 transition">
            Nuevo usuario
          </button>

          <button id="refresh"
            class="px-5 py-3 rounded-2xl bg-slate-900 text-white font-semibold shadow hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
            Actualizar
          </button>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="flex justify-between items-center mb-3 gap-3 flex-wrap">
      <div class="text-sm text-slate-500" id="summary"></div>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-4"></div>
  </div>

  <!-- MODAL CREAR USUARIO -->
  <div id="createModal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-4xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-200 flex items-center justify-between">
        <div>
          <div class="text-xl font-extrabold">Nuevo usuario</div>
          <div class="text-sm text-slate-500 mt-1">Creá un usuario y asignale permisos.</div>
        </div>

        <button id="closeCreateModal" class="px-3 py-2 rounded-xl hover:bg-slate-100">✕</button>
      </div>

      <div class="p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="text-xs text-slate-400 mb-1 block">Email</label>
            <input id="createEmail" type="email" placeholder="admin@empresa.com"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
          </div>

          <div>
            <label class="text-xs text-slate-400 mb-1 block">Estado</label>
            <select id="createEnabled"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm">
              <option value="true">Activo</option>
              <option value="false">Inactivo</option>
            </select>
          </div>

          <div class="md:col-span-3">
            <label class="text-xs text-slate-400 mb-1 block">Password</label>
            <input id="createPassword" type="password" placeholder="mínimo 4"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 transition"/>
          </div>
        </div>

        <div class="bg-slate-50 border border-slate-200 rounded-3xl p-5">
          <div class="text-lg font-extrabold">Permisos</div>
          <div class="text-sm text-slate-500 mt-1">Definen qué módulos puede usar este usuario.</div>

          <div class="mt-5 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <label id="boxCreateOrders" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessOrders" type="checkbox" class="h-4 w-4 rounded border-slate-300" checked>
              <span class="text-sm font-semibold">Pedidos</span>
            </label>

            <label id="boxCreateProducts" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessProducts" type="checkbox" class="h-4 w-4 rounded border-slate-300" checked>
              <span class="text-sm font-semibold">Productos</span>
            </label>

            <label id="boxCreateCategories" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessCategories" type="checkbox" class="h-4 w-4 rounded border-slate-300" checked>
              <span class="text-sm font-semibold">Categorías</span>
            </label>

            <label id="boxCreateShifts" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessShifts" type="checkbox" class="h-4 w-4 rounded border-slate-300" checked>
              <span class="text-sm font-semibold">Horarios</span>
            </label>

            <label id="boxCreateDashboard" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessDashboard" type="checkbox" class="h-4 w-4 rounded border-slate-300" checked>
              <span class="text-sm font-semibold">Resumen diario</span>
            </label>

            <label id="boxCreateTablesWaiter" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessTablesWaiter" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Mozo</span>
            </label>

            <label id="boxCreateTableConfig" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessTableConfig" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Configurador</span>
            </label>

            <label id="boxCreateTableDashboard" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="createCanAccessTableDashboard" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Config + Dashboard</span>
            </label>
          </div>
        </div>

        <div class="flex justify-end gap-2 flex-wrap">
          <button id="cancelCreate"
            class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
            Cancelar
          </button>

          <button id="create"
            class="px-5 py-3 rounded-2xl bg-emerald-100 text-emerald-800 font-semibold hover:bg-emerald-200 transition">
            Crear usuario
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR PERMISOS -->
  <div id="editModal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-4xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-200 flex items-center justify-between">
        <div>
          <div class="text-xl font-extrabold">Editar permisos</div>
          <div class="text-sm text-slate-500 mt-1" id="editUserEmail">—</div>
        </div>

        <button id="closeEditModal" class="px-3 py-2 rounded-xl hover:bg-slate-100">✕</button>
      </div>

      <div class="p-6 space-y-6">
        <input type="hidden" id="editUserId"/>

        <div class="bg-slate-50 border border-slate-200 rounded-3xl p-5">
          <div class="text-lg font-extrabold">Permisos</div>
          <div class="text-sm text-slate-500 mt-1">Actualizá lo que este usuario puede usar.</div>

          <div class="mt-5 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <label id="boxEditOrders" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessOrders" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Pedidos</span>
            </label>

            <label id="boxEditProducts" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessProducts" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Productos</span>
            </label>

            <label id="boxEditCategories" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessCategories" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Categorías</span>
            </label>

            <label id="boxEditShifts" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessShifts" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Horarios</span>
            </label>

            <label id="boxEditDashboard" class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessDashboard" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Resumen diario</span>
            </label>

            <label id="boxEditTablesWaiter" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessTablesWaiter" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Mozo</span>
            </label>

            <label id="boxEditTableConfig" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessTableConfig" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Configurador</span>
            </label>

            <label id="boxEditTableDashboard" class="hidden flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3">
              <input id="editCanAccessTableDashboard" type="checkbox" class="h-4 w-4 rounded border-slate-300">
              <span class="text-sm font-semibold">Mesas · Config + Dashboard</span>
            </label>
          </div>
        </div>

        <div class="flex justify-end gap-2 flex-wrap">
          <button id="cancelEdit"
            class="px-4 py-2 rounded-xl bg-slate-100 text-slate-800 font-semibold hover:bg-slate-200 transition">
            Cancelar
          </button>

          <button id="saveEdit"
            class="px-5 py-3 rounded-2xl bg-indigo-100 text-indigo-800 font-semibold hover:bg-indigo-200 transition">
            Guardar cambios
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL RESET PASSWORD -->
  <div id="modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <div class="relative max-w-lg mx-auto mt-16 bg-white rounded-3xl shadow-2xl border border-slate-200 p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="text-xl font-extrabold">Reset password</div>
        <button id="closeModal" class="px-3 py-2 hover:bg-slate-100 rounded-xl">✕</button>
      </div>

      <input type="hidden" id="resetUserId"/>

      <div class="grid grid-cols-1 gap-4">
        <div>
          <label class="text-xs text-slate-400 mb-1 block">Usuario</label>
          <div id="resetUserEmail" class="font-semibold text-slate-800">—</div>
        </div>

        <div>
          <label class="text-xs text-slate-400 mb-1 block">Nueva contraseña</label>
          <input id="resetPassword" type="password" placeholder="mínimo 4"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"/>
        </div>
      </div>

      <div class="mt-5 text-right">
        <button id="btnReset"
          class="px-4 py-2 rounded-xl bg-amber-500 text-white font-semibold hover:bg-amber-600 hover:shadow-lg transition text-sm">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="fixed top-6 right-6 z-50"></div>

  <script>
    let CONFIG = null;
    let usersCache = [];
    let filteredUsers = [];
    let isRefreshing = false;

    let companyFeatures = {
      featureOrdersEnabled: true,
      featureProductsEnabled: true,
      featureCategoriesEnabled: true,
      featureShiftsEnabled: true,
      featureDashboardEnabled: true,
      featureTableManagementEnabled: false
    };

    const MANAGE_COMPANY_ID_KEY = "menuonline_manage_companyId";
    const MANAGE_COMPANY_NAME_KEY = "menuonline_manage_companyName";

    const FEATURE_ORDERS_KEY = "menuonline_featureOrdersEnabled";
    const FEATURE_PRODUCTS_KEY = "menuonline_featureProductsEnabled";
    const FEATURE_CATEGORIES_KEY = "menuonline_featureCategoriesEnabled";
    const FEATURE_SHIFTS_KEY = "menuonline_featureShiftsEnabled";
    const FEATURE_DASHBOARD_KEY = "menuonline_featureDashboardEnabled";
    const FEATURE_TABLES_KEY = "menuonline_featureTableManagementEnabled";

    const TOKEN_KEY = "menuonline_token";
    const SLUG_KEY  = "menuonline_companySlug";
    const LOGIN_PAGE = "../login.html";
    const CONFIG_PATH = "../config.json";

    const EXP_KEY   = "menuonline_token_exp_utc";
    const LEEWAY_MS = 30000;

    function logoutToLogin(){
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(EXP_KEY);
      localStorage.removeItem(SLUG_KEY);
      localStorage.removeItem("menuonline_role");
      localStorage.removeItem("menuonline_isSuperAdmin");
      location.replace(LOGIN_PAGE);
    }

    function isSessionValid(){
      const token = localStorage.getItem(TOKEN_KEY);
      const expUtc = localStorage.getItem(EXP_KEY);
      if(!token || !expUtc) return false;

      const expMs = Date.parse(expUtc);
      if(Number.isNaN(expMs)) return false;

      return (Date.now() + LEEWAY_MS) < expMs;
    }

    function requireAuth(){
      if(!isSessionValid()){
        logoutToLogin();
        return false;
      }
      return true;
    }

    function authHeaders(extra = {}){
      const token = localStorage.getItem(TOKEN_KEY);
      return { ...extra, "Authorization": "Bearer " + token };
    }

    async function fetchAuth(url, options = {}){
      if(!requireAuth()) return null;

      const res = await fetch(url, {
        ...options,
        headers: authHeaders(options.headers || {})
      });

      if(res.status === 401 || res.status === 403){
        logoutToLogin();
        return null;
      }
      return res;
    }

    let activeToast = null;

    function toast(message, type="info", ms=1600){
      const container = document.getElementById("toastContainer");
      if(activeToast){ activeToast.remove(); activeToast = null; }

      const colors = { success:"bg-emerald-500", error:"bg-rose-500", info:"bg-slate-900" };
      const icon = type==="success" ? "✓" : type==="error" ? "⚠" : "⏳";

      const el = document.createElement("div");
      el.className = `${colors[type]} text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 min-w-[280px]
                      transform transition-all duration-200 translate-y-2 opacity-0`;
      el.innerHTML = `<div class="text-lg font-bold leading-none">${icon}</div>
                      <div class="text-sm font-semibold">${message}</div>`;
      container.appendChild(el);
      activeToast = el;

      requestAnimationFrame(()=> el.classList.remove("translate-y-2","opacity-0"));

      setTimeout(()=>{
        if(activeToast !== el) return;
        el.classList.add("translate-y-2","opacity-0");
        setTimeout(()=>{ if(activeToast===el) activeToast=null; el.remove(); }, 200);
      }, ms);
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setSummary(items){
      document.getElementById("summary").textContent = items.length ? `${items.length} usuario(s)` : "";
    }

    function badgeEnabled(enabled){
      return enabled
        ? `<span class="text-xs px-2 py-1 rounded-lg bg-emerald-100 text-emerald-800 font-semibold">Activo</span>`
        : `<span class="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold">Inactivo</span>`;
    }

    function fmtDate(dt){
      if(!dt) return "—";
      const d = new Date(dt);
      if(String(d) === "Invalid Date") return "—";
      return d.toLocaleString("es-AR");
    }

    function userMatchesSearch(u, q){
      const text = `${u.email || ""} ${u.role || ""}`.toLowerCase();
      return text.includes(q);
    }

    function currentSearch(){
      return (document.getElementById("search").value || "").trim().toLowerCase();
    }

    function applySearchAndRender(){
      const q = currentSearch();
      filteredUsers = q
        ? usersCache.filter(u => userMatchesSearch(u, q))
        : [...usersCache];

      render(filteredUsers);
    }

    function permissionsText(u){
      const arr = [];
      if(u.canAccessOrders) arr.push("Pedidos");
      if(u.canAccessProducts) arr.push("Productos");
      if(u.canAccessCategories) arr.push("Categorías");
      if(u.canAccessShifts) arr.push("Horarios");
      if(u.canAccessDashboard) arr.push("Resumen");
      if(u.canAccessTablesWaiter) arr.push("Mesas Mozo");
      if(u.canAccessTableConfig) arr.push("Mesas Config");
      if(u.canAccessTableDashboard) arr.push("Mesas Config+Dashboard");
      return arr.length ? arr.join(" · ") : "Sin permisos";
    }

    function permissionsBadges(u){
      const on = "bg-violet-50 text-violet-800 border-violet-100";
      const off = "bg-slate-100 text-slate-500 border-slate-200";

      return `
        <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessOrders ? on : off}">Pedidos</span>
        <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessProducts ? on : off}">Productos</span>
        <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessCategories ? on : off}">Categorías</span>
        <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessShifts ? on : off}">Horarios</span>
        <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessDashboard ? on : off}">Resumen</span>
        ${companyFeatures.featureTableManagementEnabled ? `
          <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessTablesWaiter ? on : off}">Mesas · Mozo</span>
          <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessTableConfig ? on : off}">Mesas · Config</span>
          <span class="px-2 py-1 rounded-xl text-xs font-semibold border ${u.canAccessTableDashboard ? on : off}">Mesas · Config+Dashboard</span>
        ` : ``}
      `;
    }

    function clearCreateForm(){
      document.getElementById("createEmail").value = "";
      document.getElementById("createPassword").value = "";
      document.getElementById("createEnabled").value = "true";
      document.getElementById("createCanAccessOrders").checked = true;
      document.getElementById("createCanAccessProducts").checked = true;
      document.getElementById("createCanAccessCategories").checked = true;
      document.getElementById("createCanAccessShifts").checked = true;
      document.getElementById("createCanAccessDashboard").checked = true;
      document.getElementById("createCanAccessTablesWaiter").checked = false;
      document.getElementById("createCanAccessTableConfig").checked = false;
      document.getElementById("createCanAccessTableDashboard").checked = false;
      applyCompanyModulesToPermissionUI();
    }

    function openCreateModal(){
      clearCreateForm();
      document.getElementById("createModal").classList.remove("hidden");
    }

    function closeCreateModal(){
      document.getElementById("createModal").classList.add("hidden");
    }

    function openEditModal(u){
      document.getElementById("editUserId").value = String(u.id);
      document.getElementById("editUserEmail").textContent = u.email || "—";
      document.getElementById("editCanAccessOrders").checked = !!u.canAccessOrders;
      document.getElementById("editCanAccessProducts").checked = !!u.canAccessProducts;
      document.getElementById("editCanAccessCategories").checked = !!u.canAccessCategories;
      document.getElementById("editCanAccessShifts").checked = !!u.canAccessShifts;
      document.getElementById("editCanAccessDashboard").checked = !!u.canAccessDashboard;
      document.getElementById("editCanAccessTablesWaiter").checked = !!u.canAccessTablesWaiter;
      document.getElementById("editCanAccessTableConfig").checked = !!u.canAccessTableConfig;
      document.getElementById("editCanAccessTableDashboard").checked = !!u.canAccessTableDashboard;
      applyCompanyModulesToPermissionUI();
      document.getElementById("editModal").classList.remove("hidden");
    }

    function closeEditModal(){
      document.getElementById("editModal").classList.add("hidden");
    }

    function readCompanyFeaturesFromLocalStorage(){
      companyFeatures = {
        featureOrdersEnabled: localStorage.getItem(FEATURE_ORDERS_KEY) !== "false",
        featureProductsEnabled: localStorage.getItem(FEATURE_PRODUCTS_KEY) !== "false",
        featureCategoriesEnabled: localStorage.getItem(FEATURE_CATEGORIES_KEY) !== "false",
        featureShiftsEnabled: localStorage.getItem(FEATURE_SHIFTS_KEY) !== "false",
        featureDashboardEnabled: localStorage.getItem(FEATURE_DASHBOARD_KEY) !== "false",
        featureTableManagementEnabled: localStorage.getItem(FEATURE_TABLES_KEY) === "true"
      };
    }

    function setPermissionBoxVisible(boxId, inputId, visible){
      const box = document.getElementById(boxId);
      const input = document.getElementById(inputId);
      if(!box || !input) return;

      box.classList.toggle("hidden", !visible);

      if(!visible){
        input.checked = false;
      }
    }

    function applyCompanyModulesToPermissionUI(){
      setPermissionBoxVisible("boxCreateOrders", "createCanAccessOrders", !!companyFeatures.featureOrdersEnabled);
      setPermissionBoxVisible("boxCreateProducts", "createCanAccessProducts", !!companyFeatures.featureProductsEnabled);
      setPermissionBoxVisible("boxCreateCategories", "createCanAccessCategories", !!companyFeatures.featureCategoriesEnabled);
      setPermissionBoxVisible("boxCreateShifts", "createCanAccessShifts", !!companyFeatures.featureShiftsEnabled);
      setPermissionBoxVisible("boxCreateDashboard", "createCanAccessDashboard", !!companyFeatures.featureDashboardEnabled);

      setPermissionBoxVisible("boxEditOrders", "editCanAccessOrders", !!companyFeatures.featureOrdersEnabled);
      setPermissionBoxVisible("boxEditProducts", "editCanAccessProducts", !!companyFeatures.featureProductsEnabled);
      setPermissionBoxVisible("boxEditCategories", "editCanAccessCategories", !!companyFeatures.featureCategoriesEnabled);
      setPermissionBoxVisible("boxEditShifts", "editCanAccessShifts", !!companyFeatures.featureShiftsEnabled);
      setPermissionBoxVisible("boxEditDashboard", "editCanAccessDashboard", !!companyFeatures.featureDashboardEnabled);

      setPermissionBoxVisible("boxCreateTablesWaiter", "createCanAccessTablesWaiter", !!companyFeatures.featureTableManagementEnabled);
      setPermissionBoxVisible("boxCreateTableConfig", "createCanAccessTableConfig", !!companyFeatures.featureTableManagementEnabled);
      setPermissionBoxVisible("boxCreateTableDashboard", "createCanAccessTableDashboard", !!companyFeatures.featureTableManagementEnabled);

      setPermissionBoxVisible("boxEditTablesWaiter", "editCanAccessTablesWaiter", !!companyFeatures.featureTableManagementEnabled);
      setPermissionBoxVisible("boxEditTableConfig", "editCanAccessTableConfig", !!companyFeatures.featureTableManagementEnabled);
      setPermissionBoxVisible("boxEditTableDashboard", "editCanAccessTableDashboard", !!companyFeatures.featureTableManagementEnabled);
    }

    async function loadConfig(){
      const r = await fetch(CONFIG_PATH, { cache: "no-store" });
      if(!r.ok) throw new Error("No pude leer config.json");
      return await r.json();
    }

    function getCompanyId(){
      const v = localStorage.getItem(MANAGE_COMPANY_ID_KEY);
      const id = Number(v);
      return Number.isFinite(id) && id > 0 ? id : null;
    }

    async function apiGetUsers(companyId){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/admin-users?companyId=${companyId}`;
      const r = await fetchAuth(url);
      if(!r) return [];
      if(!r.ok) throw new Error("Error cargando usuarios");
      const data = await r.json();
      return Array.isArray(data) ? data : [];
    }

    async function apiCreateCompanyAdmin(payload){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/admin-users/company-admin`;
      return await fetchAuth(url, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function apiSetEnabled(userId, enabled){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/admin-users/${userId}/enabled`;
      return await fetchAuth(url, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ enabled: !!enabled })
      });
    }

    async function apiResetPassword(userId, newPassword){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/admin-users/${userId}/password`;
      return await fetchAuth(url, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ password: newPassword })
      });
    }

    async function apiUpdatePermissions(userId, payload){
      const url = `${CONFIG.apiBaseUrl}/api/superadmin/admin-users/${userId}/permissions`;
      return await fetchAuth(url, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
    }

    function render(items){
      const el = document.getElementById("list");
      setSummary(items);

      if(!items.length){
        el.innerHTML = `
          <div class="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
            <div class="font-semibold">No hay usuarios</div>
            <div class="text-sm text-slate-600 mt-1">Probá cambiando la búsqueda o creá uno nuevo.</div>
          </div>`;
        return;
      }

      el.innerHTML = items.map(u => `
        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 transition-all duration-200 hover:shadow-xl hover:-translate-y-1">
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div class="min-w-[280px] flex-1">
              <div class="flex items-center gap-2 flex-wrap">
                <div class="text-lg font-extrabold">${escapeHtml(u.email)}</div>
                ${badgeEnabled(!!u.enabled)}
                <span class="text-xs px-2 py-1 rounded-xl bg-slate-100 text-slate-700 font-semibold">${escapeHtml(u.role || "CompanyAdmin")}</span>
              </div>

              <div class="text-sm text-slate-500 mt-2">
                Permisos: <span class="font-semibold text-slate-800">${escapeHtml(permissionsText(u))}</span>
              </div>

              <div class="mt-3 flex flex-wrap gap-2">
                ${permissionsBadges(u)}
              </div>

              <div class="text-xs text-slate-400 mt-3">
                Id: ${u.id}
                · Creado: ${fmtDate(u.createdAt)}
                · Último login: ${fmtDate(u.lastLoginAt)}
              </div>
            </div>

            <div class="flex gap-2 flex-wrap justify-end">
              <button class="px-4 py-2 rounded-xl bg-indigo-100 text-indigo-900 font-semibold hover:bg-indigo-200 transition"
                data-edit="1" data-id="${u.id}">
                Editar
              </button>

              <button class="px-4 py-2 rounded-xl ${u.enabled ? "bg-slate-100 hover:bg-slate-200" : "bg-emerald-100 text-emerald-900 hover:bg-emerald-200"} transition font-semibold"
                data-toggle="1" data-id="${u.id}">
                ${u.enabled ? "Desactivar" : "Activar"}
              </button>

              <button class="px-4 py-2 rounded-xl bg-amber-100 text-amber-900 font-semibold hover:bg-amber-200 transition"
                data-reset="1" data-id="${u.id}">
                Reset password
              </button>
            </div>
          </div>
        </div>
      `).join("");

      el.querySelectorAll("button[data-toggle='1']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.getAttribute("data-id"));
          const u = usersCache.find(x => x.id === id);
          if(!u) return;

          try{
            toast("Guardando...", "info", 900);
            const r = await apiSetEnabled(id, !u.enabled);
            if(!r) return;

            if(!r.ok){
              const t = await r.text().catch(()=> "");
              console.error(t);
              toast("No se pudo cambiar estado", "error", 2000);
              return;
            }

            toast("Actualizado ✅", "success", 1200);
            await refresh();
          }catch(e){
            console.error(e);
            toast("Error cambiando estado", "error", 2000);
          }
        });
      });

      el.querySelectorAll("button[data-reset='1']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-id"));
          const u = usersCache.find(x => x.id === id);
          if(!u) return;

          document.getElementById("resetUserId").value = String(u.id);
          document.getElementById("resetUserEmail").textContent = u.email;
          document.getElementById("resetPassword").value = "";
          document.getElementById("modal").classList.remove("hidden");
        });
      });

      el.querySelectorAll("button[data-edit='1']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-id"));
          const u = usersCache.find(x => x.id === id);
          if(!u) return;
          openEditModal(u);
        });
      });
    }

    async function refresh(){
      if(isRefreshing) return;
      isRefreshing = true;

      const btn = document.getElementById("refresh");
      const old = btn.textContent;
      btn.textContent = "Cargando...";
      btn.disabled = true;

      try{
        const companyId = getCompanyId();
        if(!companyId){
          toast("Falta empresa seleccionada. Volviendo...", "error", 1600);
          setTimeout(()=> location.href = "./companies.html", 600);
          return;
        }

        const items = await apiGetUsers(companyId);
        usersCache = items;
        applySearchAndRender();
      } finally {
        btn.textContent = old;
        btn.disabled = false;
        isRefreshing = false;
      }
    }

    document.getElementById("btnLogout").addEventListener("click", logoutToLogin);
    document.getElementById("btnBackCompanies").addEventListener("click", () => location.href = "./companies.html");
    document.getElementById("refresh").addEventListener("click", refresh);
    document.getElementById("search").addEventListener("input", applySearchAndRender);

    document.getElementById("btnOpenCreate").addEventListener("click", openCreateModal);
    document.getElementById("closeCreateModal").addEventListener("click", closeCreateModal);
    document.getElementById("cancelCreate").addEventListener("click", closeCreateModal);

    document.getElementById("closeEditModal").addEventListener("click", closeEditModal);
    document.getElementById("cancelEdit").addEventListener("click", closeEditModal);

    document.getElementById("create").addEventListener("click", async () => {
      const companyId = getCompanyId();
      if(!companyId){ toast("Falta empresa seleccionada", "error", 2000); return; }

      const email = (document.getElementById("createEmail").value || "").trim().toLowerCase();
      const password = document.getElementById("createPassword").value || "";
      const enabled = document.getElementById("createEnabled").value === "true";

      const canAccessOrders = companyFeatures.featureOrdersEnabled && document.getElementById("createCanAccessOrders").checked;
      const canAccessProducts = companyFeatures.featureProductsEnabled && document.getElementById("createCanAccessProducts").checked;
      const canAccessCategories = companyFeatures.featureCategoriesEnabled && document.getElementById("createCanAccessCategories").checked;
      const canAccessShifts = companyFeatures.featureShiftsEnabled && document.getElementById("createCanAccessShifts").checked;
      const canAccessDashboard = companyFeatures.featureDashboardEnabled && document.getElementById("createCanAccessDashboard").checked;

      const canAccessTablesWaiter = companyFeatures.featureTableManagementEnabled && document.getElementById("createCanAccessTablesWaiter").checked;
      const canAccessTableConfig = companyFeatures.featureTableManagementEnabled && document.getElementById("createCanAccessTableConfig").checked;
      const canAccessTableDashboard = companyFeatures.featureTableManagementEnabled && document.getElementById("createCanAccessTableDashboard").checked;

      if(!email){ toast("Email requerido", "error", 1800); return; }
      if(!password || password.length < 4){ toast("Password inválida", "error", 1800); return; }

      try{
        toast("Creando...", "info", 1200);

        const payload = {
          email,
          password,
          enabled,
          companyId,
          canAccessOrders,
          canAccessProducts,
          canAccessCategories,
          canAccessShifts,
          canAccessDashboard,
          canAccessTablesWaiter,
          canAccessTableConfig,
          canAccessTableDashboard
        };

        const r = await apiCreateCompanyAdmin(payload);
        if(!r) return;

        if(r.status === 409){
          toast("Ya existe ese email", "error", 2200);
          return;
        }
        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.error(t);
          toast("Error creando (mirá consola)", "error", 2500);
          return;
        }

        toast("Usuario creado ✅", "success", 1400);
        closeCreateModal();
        await refresh();
      }catch(e){
        console.error(e);
        toast("Error creando", "error", 2500);
      }
    });

    document.getElementById("saveEdit").addEventListener("click", async () => {
      const id = Number(document.getElementById("editUserId").value || 0);
      if(!id){ toast("Usuario inválido", "error", 1800); return; }

      try{
        toast("Guardando...", "info", 1200);

        const payload = {
          canAccessOrders: companyFeatures.featureOrdersEnabled && document.getElementById("editCanAccessOrders").checked,
          canAccessProducts: companyFeatures.featureProductsEnabled && document.getElementById("editCanAccessProducts").checked,
          canAccessCategories: companyFeatures.featureCategoriesEnabled && document.getElementById("editCanAccessCategories").checked,
          canAccessShifts: companyFeatures.featureShiftsEnabled && document.getElementById("editCanAccessShifts").checked,
          canAccessDashboard: companyFeatures.featureDashboardEnabled && document.getElementById("editCanAccessDashboard").checked,
          canAccessTablesWaiter: companyFeatures.featureTableManagementEnabled && document.getElementById("editCanAccessTablesWaiter").checked,
          canAccessTableConfig: companyFeatures.featureTableManagementEnabled && document.getElementById("editCanAccessTableConfig").checked,
          canAccessTableDashboard: companyFeatures.featureTableManagementEnabled && document.getElementById("editCanAccessTableDashboard").checked
        };

        const r = await apiUpdatePermissions(id, payload);
        if(!r) return;

        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.error(t);
          toast("Error guardando permisos", "error", 2500);
          return;
        }

        toast("Permisos actualizados ✅", "success", 1400);
        closeEditModal();
        await refresh();
      }catch(e){
        console.error(e);
        toast("Error guardando permisos", "error", 2500);
      }
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      document.getElementById("modal").classList.add("hidden");
    });

    document.getElementById("btnReset").addEventListener("click", async () => {
      const id = Number(document.getElementById("resetUserId").value);
      const pass = document.getElementById("resetPassword").value || "";

      if(!id){ toast("Usuario inválido", "error", 1800); return; }
      if(!pass || pass.length < 4){ toast("Password inválida", "error", 1800); return; }

      try{
        toast("Guardando...", "info", 1200);
        const r = await apiResetPassword(id, pass);
        if(!r) return;

        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.error(t);
          toast("Error guardando (mirá consola)", "error", 2500);
          return;
        }

        toast("Password actualizada ✅", "success", 1400);
        document.getElementById("modal").classList.add("hidden");
        await refresh();
      }catch(e){
        console.error(e);
        toast("Error guardando", "error", 2500);
      }
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        document.getElementById("modal").classList.add("hidden");
        closeCreateModal();
        closeEditModal();
      }
    });

    (async function init(){
      try{
        if(!requireAuth()) return;

        const companyId = getCompanyId();
        const companyName = localStorage.getItem(MANAGE_COMPANY_NAME_KEY) || "—";
        document.getElementById("companyName").textContent = companyName;
        document.getElementById("companyIdTxt").textContent = companyId ? String(companyId) : "—";

        CONFIG = await loadConfig();

        if(!companyId){
          toast("Elegí una empresa primero", "error", 1800);
          setTimeout(()=> location.href = "./companies.html", 600);
          return;
        }

        readCompanyFeaturesFromLocalStorage();
        applyCompanyModulesToPermissionUI();

        await refresh();
      }catch(e){
        console.error(e);
        toast("Error cargando", "error", 2500);
      }
    })();
  </script>
</body>
</html>
